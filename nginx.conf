server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    # gzip — biggest target is dist/univer.js (~11 MB → ~3 MB on the
    # wire), then index.html (~250 KB → ~50 KB) and dist/univer.css.
    # PNGs are already compressed, skip them.
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    # text/html is gzipped by default — listing it again triggers
    # "duplicate MIME type" warning on container start.
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # index.html — refresh-friendly: short cache so deploys propagate
    # without users having to hard-reload.
    location = /index.html {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # PNG icons — content-hashed by filename effectively (Sheets.png /
    # Doc.png never change), cache aggressively.
    location ~ \.png$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Univer bundle (univer.js / univer.css) — filenames are not
    # content-hashed, so we can't use immutable. Match index.html's
    # 5-min revalidate policy so a deploy propagates within 5 minutes.
    # ETag (nginx default) makes revalidation cheap (304 = empty body).
    location ^~ /dist/ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — required by the History API routing in the app.
    # Hard refresh on /sheets or /docs would 404 without this; we serve
    # index.html instead and let the client-side router mount the view
    # matching location.pathname.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden / dotfiles defensively.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
