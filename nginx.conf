server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    charset utf-8;

    # gzip — Univer assets load from external CDN so the only on-server
    # gzip target that matters is index.html itself (~250 KB → ~50 KB).
    # PNGs are already compressed, skip them.
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_types
        text/plain
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # index.html — refresh-friendly: short cache so deploys propagate
    # without users having to hard-reload.
    location = /index.html {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # PNG icons — content-hashed by filename effectively (Sheets.png /
    # Doc.png never change), cache aggressively.
    location ~ \.png$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Everything else: serve, fall back to index.html. Hash routing
    # (#/sheets, #/docs) doesn't actually need this because the fragment
    # never reaches the server — but a future move to History API would.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden / dotfiles defensively.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
