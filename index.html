                const bodyChunks = SeShared.print.pdfGenerator.splitColumnsForPages(
                    bodyColWidthsMm, splitterPrintableW);
                const colChunks = bodyChunks.map(chunk => [
                    ...repeatCols,
                    ...chunk.map(idxInBody => bodyCols[idxInBody]),
                ]);
                // Guard: empty workbook after slicing — still emit one
                // empty chunk so we don't crash on doc.output.
                if (colChunks.length === 0) colChunks.push([...repeatCols]);

                // Repeat-rows form the autoTable head (autoTable repeats
                // the head section on every page automatically). Only
                // populate it when the user actually set Print Titles —
                // otherwise nothing repeats, matching Excel / Google
                // Sheets defaults. The old behaviour (row minR as head
                // by default) caused a merged title row like "บริษัท …"
                // to reappear at the top of every printed page even
                // though the user never asked for that.
                const headRowsRange = hasRepeatRows
                    ? { start: repeatRowFirst, end: repeatRowLast }
                    : null;
                const bodyRowsList = [];
                for (let r = minR; r <= maxR; r++) {
                    if (headRowsRange
                        && r >= headRowsRange.start
                        && r <= headRowsRange.end) continue;
                    bodyRowsList.push(r);
                }

                colChunks.forEach((chunkCols, chunkIdx) => {
                    if (chunkIdx > 0) doc.addPage();
                    const chunkHead = [];
                    if (headRowsRange) {
                        for (let r = headRowsRange.start; r <= headRowsRange.end; r++) {
                            chunkHead.push(buildRowForChunk(r, chunkCols));
                        }
                    }
                    const chunkBody = bodyRowsList.map(
                        r => buildRowForChunk(r, chunkCols));
                    // Pre-set columnStyles so each PDF column matches the
                    // source column's exact (scaled) width. Without this
                    // autoTable would auto-fit each chunk independently
                    // and widths would drift between chunks.
                    const columnStyles = {};
                    chunkCols.forEach((srcCol, dstCol) => {
                        columnStyles[dstCol] = { cellWidth: scaledColWidths[srcCol - minC] };
                    });
                    doc.autoTable({
                        head: chunkHead,
                        body: chunkBody,
                        theme: 'grid',
                        startY: ps.marginTop + headerSpace,
                        styles: {
                            font: 'THSarabun', fontSize, cellPadding,
                            overflow: 'linebreak', valign: 'top',
                            lineColor: [180, 180, 180], lineWidth: 0.1,
                            fillColor: false,
                        },
                        headStyles: {
                            font: 'THSarabun',
                            fillColor: [255, 255, 255], textColor: [0, 0, 0],
                            fontStyle: 'normal',
                        },
                        alternateRowStyles: { fillColor: false },
                        columnStyles,
                        margin: {
                            left: ps.marginLeft,
                            right: ps.marginRight,
                            top: ps.marginTop + headerSpace,
                            bottom: ps.marginBottom + footerSpace,
                        },
                        didDrawPage: (data) => {
                            if (ps.header) {
                                doc.setFont('THSarabun', 'bold');
                                doc.setFontSize(11);
                                doc.setTextColor(30, 41, 59);
                                doc.text(headerTitle, ps.marginLeft, ps.marginTop + 5);
                                doc.setFont('THSarabun', 'normal');
                                doc.setFontSize(8);
                                doc.setTextColor(100, 116, 139);
                                doc.text(headerSub, ps.marginLeft, ps.marginTop + 9);
                            }
                            if (ps.footer) {
                                const total = doc.internal.getNumberOfPages();
                                const pageW = doc.internal.pageSize.getWidth();
                                const pageH = doc.internal.pageSize.getHeight();
                                doc.setFont('THSarabun', 'normal');
                                doc.setFontSize(8);
                                doc.setTextColor(100, 116, 139);
                                // Drop the "(กลุ่มคอลัมน์ X/Y)" suffix —
                                // it shows up in portrait (where a wide
                                // table splits into chunks) but not in
                                // landscape (which usually fits in one
                                // chunk), making the two orientations
                                // look inconsistent for the same data.
                                doc.text(
                                    `หน้า ${data.pageNumber} / ${total}`,
                                    pageW - ps.marginRight,
                                    pageH - ps.marginBottom + 2,
                                    { align: 'right' },
                                );
                            }
                        },
                        didParseCell: (data) => {
                            // Map autoTable's local indices back to the
                            // source workbook's (row, col). Head rows
                            // come from headRowsRange (only present when
                            // Print Titles are set); body rows from
                            // bodyRowsList. Cols come from chunkCols.
                            const r = (data.section === 'head' && headRowsRange)
                                ? headRowsRange.start + data.row.index
                                : bodyRowsList[data.row.index];
                            const c = chunkCols[data.column.index];
                            const cell = (cellData[r] && cellData[r][c]) || null;
                            const us = resolveUniverStyle(cell);
                            // Border handling must run BEFORE the early
                            // return below: empty cells (us == null) also
                            // need their grid-theme default stripped, or
                            // blank rows like row 3 inherit the 0.1mm
                            // grid that nobody asked for.
                            const bd = us && us.bd;
                            const hasAnyBorder = bd
                                && (bd.t || bd.b || bd.l || bd.r);
                            if (hasAnyBorder) {
                                data.cell.styles.lineWidth = 0.15;
                                const firstSide = bd.t || bd.b || bd.l || bd.r;
                                const c0 = _hexToRgbArray(firstSide.cl && firstSide.cl.rgb);
                                if (c0) data.cell.styles.lineColor = c0;
                            } else {
                                data.cell.styles.lineWidth = 0;
                            }
                            if (!us) return;
                            // #4 Black & White: skip fill + text colour
                            // overrides so the cell stays white-on-black.
                            // Borders + bold/italic + alignment still
                            // come through so the structure reads OK on
                            // a mono printer.
                            if (!ps.blackAndWhite) {
                                const bg = _hexToRgbArray(us.bg && us.bg.rgb);
                                if (bg) data.cell.styles.fillColor = bg;
                                const cl = _hexToRgbArray(us.cl && us.cl.rgb);
                                if (cl) data.cell.styles.textColor = cl;
                            }
                            if (us.bl && us.it) data.cell.styles.fontStyle = 'bolditalic';
                            else if (us.bl) data.cell.styles.fontStyle = 'bold';
                            else if (us.it) data.cell.styles.fontStyle = 'italic';
                            const H = { 1: 'left', 2: 'center', 3: 'right', 4: 'justify' };
                            const V = { 1: 'top', 2: 'middle', 3: 'bottom', 4: 'middle' };
                            if (us.ht && H[us.ht]) data.cell.styles.halign = H[us.ht];
                            if (us.vt && V[us.vt]) data.cell.styles.valign = V[us.vt];
                        },
                    });
                });

                const blob = doc.output('blob');
                if (returnBlobOnly) return blob;
                const baseName = (sheet.name || 'Sheet1')
                    .replace(/[^\w฀-๿]+/g, '_') || 'Sheet';
                const filename = `SE_Report_${baseName}_${tsForFilename()}.pdf`;
                // Shared module: opens the PDF in a new tab and triggers
                // its print dialog. Falls back to <a download> when the
                // popup is blocked (usually because the user-activation
                // gesture expired during loadJsPdfAssets).
                const r = SeShared.print.preview.printPdfBlob(blob, { filename });
                if (r && r.method === 'download') {
                    setSheetStatus(
                        `บันทึก PDF ลง Downloads: ${filename} `
                        + `(เปิดแท็บใหม่ไม่ได้ — Browser block popup)`
                    );
                }
            } catch (e) {
                console.error(e);
                if (returnBlobOnly) return null;
                alert('สร้าง PDF ไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                if (!returnBlobOnly) setSheetOverlay(false);
            }
        }

        // Standalone Print: always route to the Page Setup modal — the
        // only view here is the Univer spreadsheet which can't be printed
        // via @media print because it renders to a <canvas>.
        function printActiveView() {
            if (sheetState.mode === 'docs') {
                alert('โหมดเอกสารยังไม่รองรับการพิมพ์ — รอ Univer release ตัว stable');
                return;
            }
            if (!sheetState.mounted) {
                alert('ยังไม่มี workbook ให้พิมพ์');
                return;
            }
            // Catch CDN load / init failures in the page-setup module so a
            // dead network doesn't surface as a silent unhandled rejection
            // — without this, Print just appears to do nothing and the
            // user has no way to tell whether to retry.
            return openPageSetupModal().catch(e => {
                console.error('openPageSetupModal failed:', e);
                alert('เปิด Page Setup ไม่สำเร็จ: ' + (e && e.message || e));
            });
        }

        function setSheetStatus(msg) {
            const el = document.getElementById('sheetStatus');
            if (el) el.textContent = msg || '';
        }

        function setSheetOverlay(visible, text) {
            const ov = document.getElementById('sheetLoadingOverlay');
            const tx = ov && ov.querySelector('.sheet-loading-text');
            if (tx && text) tx.textContent = text;
            if (ov) ov.classList.toggle('visible', !!visible);
        }

        // Reset the empty-state message back to its initial copy. Called
        // before showing the empty state so previous error / context-specific
        // messages don't linger across mount attempts.
        const SHEET_EMPTY_DEFAULT_HTML =
            'เริ่มต้นจาก:' +
            '<br><button type="button" class="sheet-empty-open-btn secondary" ' +
            'onclick="newBlankWorkbook()">📄 ไฟล์ใหม่</button>' +
            '<button type="button" class="sheet-empty-open-btn" ' +
            'onclick="openSheetFile()">📂 Open ไฟล์</button>';

        function setSheetEmptyText(html) {
            const el = document.querySelector('#sheetEmptyMessage > .sheet-empty-text');
            if (el) el.innerHTML = html;
        }

        function setSheetEmptyVisible(visible) {
            const el = document.getElementById('sheetEmptyMessage');
            if (el) el.classList.toggle('hidden', !visible);
            if (visible) setSheetEmptyText(SHEET_EMPTY_DEFAULT_HTML);
        }

        function _loadUniverScript(src) {
            return new Promise((resolve, reject) => {
                if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => resolve();
                s.onerror = () => reject(new Error('Failed to load script: ' + src));
                document.head.appendChild(s);
            });
        }
        function _loadUniverCss(src) {
            if (document.querySelector(`link[href="${src}"]`)) return;
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = src;
            document.head.appendChild(link);
        }

        // ===== XLSX lazy-loader =====
        // xlsx-js-style is a drop-in fork of SheetJS (same XLSX global,
        // same API surface) that ALSO writes cell-level styles — borders,
        // fills, fonts, alignment. We need this for "Save XLSX overwrites
        // the source file" to preserve the styling the user originally
        // imported from. The vanilla SheetJS Community Edition silently
        // drops styles on write, which is why round-tripping an .xlsx
        // (open → edit → save → reopen) used to come back style-less.
        // Used by Export Excel (table view), Save (.xlsx sheet view),
        // and Open .xlsx in the sheet view. ~1 MB minified.
        const SHEETJS_URL = 'https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js';
        const sheetJsState = { loaded: false, loadingPromise: null };

        function loadSheetJsAssets() {
            if (sheetJsState.loaded) return Promise.resolve();
            if (sheetJsState.loadingPromise) return sheetJsState.loadingPromise;
            sheetJsState.loadingPromise = _loadUniverScript(SHEETJS_URL).then(() => {
                if (typeof XLSX === 'undefined') {
                    throw new Error('xlsx-js-style global (XLSX) missing after script load');
                }
                sheetJsState.loaded = true;
            });
            return sheetJsState.loadingPromise.catch(err => {
                sheetJsState.loadingPromise = null;
                throw err;
            });
        }

        // ===== jsPDF + autoTable + Sarabun Thai font lazy-loader =====
        // Only loaded when the user clicks Print in Sheet view (Univer's
        // canvas-based render doesn't survive @media print). Delegates to
        // the shared print/pdf-generator module — jsPDF + autoTable + the
        // Sarabun TTFs + the addFonts event hook all live there now.
        // Total cold-start cost ~370 KB, all from jsdelivr.
        //
        // The wrapper name is kept (callers like printSheetToPdf and the
        // mount-time preloader call loadJsPdfAssets / preloadPrintAssets)
        // so this stays a 1-line drop-in.
        function loadJsPdfAssets() {
            return loadPrintPdfGeneratorAssets()
                .then(() => SeShared.print.pdfGenerator.loadAssets());
        }

        // Fire-and-forget preload, called when the user enters Sheet
        // view so the print-asset fetch finishes before they click Print.
        // Without this, the ~370 KB CDN fetch happens inside the click
        // handler — by the time it resolves, Chrome has revoked the
        // user-activation gesture and window.open() gets popup-blocked.
        function preloadPrintAssets() {
            loadJsPdfAssets().catch(e =>
                console.warn('print assets preload failed (will retry on click):', e));
        }

        // ===== PDF.js lazy-loader =====
        // Renders generated PDF pages into <canvas> elements so we can
        // build a Google-Sheets-style print preview (own toolbar, margin
        // overlay, page nav) instead of leaving the Chrome PDF plugin in
        // charge. Bundle (~500 KB) + worker fetched on first Page Setup
        // open after entering Sheet view.
        const PDFJS_URL = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js';
        const PDFJS_WORKER_URL = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        const pdfJsState = { loaded: false, loadingPromise: null };

        function loadPdfJsAssets() {
            if (pdfJsState.loaded) return Promise.resolve();
            if (pdfJsState.loadingPromise) return pdfJsState.loadingPromise;
            pdfJsState.loadingPromise = (async () => {
                await _loadUniverScript(PDFJS_URL);
                if (!window.pdfjsLib) {
                    throw new Error('pdfjsLib global missing after script load');
                }
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_URL;
                pdfJsState.loaded = true;
            })();
            return pdfJsState.loadingPromise.catch(err => {
                pdfJsState.loadingPromise = null;
                throw err;
            });
        }

        // ===== JSZip lazy-loader =====
        // Used by Open .xlsx to extract Excel Tables (xl/tables/*.xml) that
        // SheetJS Community Edition doesn't expose through its parsed
        // workbook object. ~100 KB minified — only fetched on first .xlsx
        // open, not on every page load.
        const JSZIP_URL = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        const jszipState = { loaded: false, loadingPromise: null };

        function loadJSZipAssets() {
            if (jszipState.loaded) return Promise.resolve();
            if (jszipState.loadingPromise) return jszipState.loadingPromise;
            jszipState.loadingPromise = _loadUniverScript(JSZIP_URL).then(() => {
                if (typeof JSZip === 'undefined') {
                    throw new Error('JSZip global missing after script load');
                }
                jszipState.loaded = true;
            });
            return jszipState.loadingPromise.catch(err => {
                jszipState.loadingPromise = null;
                throw err;
            });
        }

        // ===== se-univer-shared modules =====
        // Shared helper hub pinned to a git commit SHA (NOT a tag — jsDelivr
        // takes 5-30 min to mirror new tags, but commit SHAs work
        // immediately). Bump `SE_UNIVER_SHARED_SHA` when adopting newer
        // versions; see ADOPTION_BRIEF_FOR_OTHER_PROJECTS.md in
        // https://github.com/sesurvey-ai/se-univer-shared
        const SE_UNIVER_SHARED_SHA = '34545b0';  // v1.5.1
        const SE_UNIVER_SHARED_BASE = `https://cdn.jsdelivr.net/gh/sesurvey-ai/se-univer-shared@${SE_UNIVER_SHARED_SHA}`;

        // file-io/pickers — File System Access wrappers + <input>/download
        // fallbacks for Firefox / Safari / Brave-with-FSA-disabled.
        const SE_UNIVER_SHARED_FILEIO_URL = `${SE_UNIVER_SHARED_BASE}/file-io/pickers.js`;
        const fileIoState = { loaded: false, loadingPromise: null };
        function loadFileIoPickersAssets() {
            if (fileIoState.loaded) return Promise.resolve();
            if (fileIoState.loadingPromise) return fileIoState.loadingPromise;
            fileIoState.loadingPromise = _loadUniverScript(SE_UNIVER_SHARED_FILEIO_URL).then(() => {
                if (!window.SeShared || !window.SeShared.fileIo || !window.SeShared.fileIo.pickers) {
                    throw new Error('SeShared.fileIo.pickers global missing after script load');
                }
                fileIoState.loaded = true;
            });
            return fileIoState.loadingPromise.catch(err => {
                fileIoState.loadingPromise = null;
                throw err;
            });
        }

        // print/preview — popup window.open + popup.print() with popup-
        // blocker fallback to <a download>. Also exposes a Ctrl+P / Cmd+P
        // interceptor for canvas-based views where @media print returns
        // a blank page.
        const SE_UNIVER_SHARED_PRINT_PREVIEW_URL = `${SE_UNIVER_SHARED_BASE}/print/preview.js`;
        const printPreviewState = { loaded: false, loadingPromise: null };
        function loadPrintPreviewAssets() {
            if (printPreviewState.loaded) return Promise.resolve();
            if (printPreviewState.loadingPromise) return printPreviewState.loadingPromise;
            printPreviewState.loadingPromise = _loadUniverScript(SE_UNIVER_SHARED_PRINT_PREVIEW_URL).then(() => {
                if (!window.SeShared || !window.SeShared.print || !window.SeShared.print.preview) {
                    throw new Error('SeShared.print.preview global missing after script load');
                }
                printPreviewState.loaded = true;
            });
            return printPreviewState.loadingPromise.catch(err => {
                printPreviewState.loadingPromise = null;
                throw err;
            });
        }

        // print/page-setup — ~1100-line Google-style Page Setup modal +
        // PDF.js-driven live preview, all owned by the shared module.
        // init() returns a singleton control API; wire onSave to the
        // existing print pipeline and preview.generatePdf to the same
        // printSheetToPdf flow with returnBlobOnly=true.
        const SE_UNIVER_SHARED_PAGE_SETUP_URL = `${SE_UNIVER_SHARED_BASE}/print/page-setup.js`;
        const pageSetupAssetsState = { loaded: false, loadingPromise: null };
        function loadPageSetupAssets() {
            if (pageSetupAssetsState.loaded) return Promise.resolve();
            if (pageSetupAssetsState.loadingPromise) return pageSetupAssetsState.loadingPromise;
            pageSetupAssetsState.loadingPromise = _loadUniverScript(SE_UNIVER_SHARED_PAGE_SETUP_URL).then(() => {
                if (!window.SeShared || !window.SeShared.print || !window.SeShared.print.pageSetup) {
                    throw new Error('SeShared.print.pageSetup global missing after script load');
                }
                pageSetupAssetsState.loaded = true;
            });
            return pageSetupAssetsState.loadingPromise.catch(err => {
                pageSetupAssetsState.loadingPromise = null;
                throw err;
            });
        }

        // xlsx/thai-be — Layer 4 of the Thai BE import pipeline: scans an
        // already-converted Univer workbookData for Thai BE dates (text +
        // numeric serials) and rewrites them to CE-equivalent serials,
        // then translates yyyy→bbbb on every date pattern so formula
        // results (which inherit Excel's yyyy) also render in BE.
        const SE_UNIVER_SHARED_XLSX_THAIBE_URL = `${SE_UNIVER_SHARED_BASE}/xlsx/thai-be.js`;
        const xlsxThaiBeState = { loaded: false, loadingPromise: null };
        function loadXlsxThaiBeAssets() {
            if (xlsxThaiBeState.loaded) return Promise.resolve();
            if (xlsxThaiBeState.loadingPromise) return xlsxThaiBeState.loadingPromise;
            xlsxThaiBeState.loadingPromise = _loadUniverScript(SE_UNIVER_SHARED_XLSX_THAIBE_URL).then(() => {
                if (!window.SeShared || !window.SeShared.xlsx || !window.SeShared.xlsx.thaiBe) {
                    throw new Error('SeShared.xlsx.thaiBe global missing after script load');
                }
                xlsxThaiBeState.loaded = true;
            });
            return xlsxThaiBeState.loadingPromise.catch(err => {
                xlsxThaiBeState.loadingPromise = null;
                throw err;
            });
        }

        // print/pdf-generator — owns the jsPDF + autoTable + Sarabun font
        // load (~370 KB total), the column-pagination math, and the
        // paper/margin layout math. The local loadJsPdfAssets /
        // preloadPrintAssets wrappers (defined further up next to the
        // other lazy-loaders) delegate to this so existing callers
        // (printSheetToPdf, the preload-on-mount entry point) keep their
        // existing function names.
        const SE_UNIVER_SHARED_PRINT_GEN_URL = `${SE_UNIVER_SHARED_BASE}/print/pdf-generator.js`;
        const printGenState = { loaded: false, loadingPromise: null };
        function loadPrintPdfGeneratorAssets() {
            if (printGenState.loaded) return Promise.resolve();
            if (printGenState.loadingPromise) return printGenState.loadingPromise;
            printGenState.loadingPromise = _loadUniverScript(SE_UNIVER_SHARED_PRINT_GEN_URL).then(() => {
                if (!window.SeShared || !window.SeShared.print || !window.SeShared.print.pdfGenerator) {
                    throw new Error('SeShared.print.pdfGenerator global missing after script load');
                }
                printGenState.loaded = true;
            });
            return printGenState.loadingPromise.catch(err => {
                printGenState.loadingPromise = null;
                throw err;
            });
        }

        // Hijack Ctrl+P / Cmd+P so the browser's native print dialog
        // doesn't dump a blank page for Sheet view (Univer renders to a
        // <canvas> that @media print can't scrape). Routes through
        // printActiveView so the keyboard shortcut and the toolbar
        // button produce the same output, regardless of which view is
        // active.
        //
        // Positioned AFTER the SeShared loader declarations above —
        // calling loadPrintPreviewAssets() earlier hits a TDZ on the
        // `const printPreviewState` it closes over and throws Uncaught,
        // which would abort the rest of the script (including the
        // launcher click bindings at the bottom).
        //
        // The shared interceptor swallows Ctrl+P unconditionally; the
        // mode check inside the handler decides whether to route to
        // Page Setup or fall back to the native dialog. Lazy-load the
        // module on first DOMContentLoaded — fire-and-forget; it's not
        // a hard dependency and Ctrl+P is rare enough that a brief
        // interval where it falls through to native is acceptable.
        loadPrintPreviewAssets().then(() => {
            SeShared.print.preview.interceptPrintShortcut(() => {
                // Print is sheets-only. In docs mode (or on the launcher)
                // let the native browser dialog handle Ctrl+P — there's
                // no Page Setup pipeline for docs.
                if (sheetState.mode !== 'sheets') {
                    // Signal "did not handle" by re-firing the default —
                    // but the shared module preventDefault'd already, so
                    // we just no-op. Trade-off: in docs mode Ctrl+P is
                    // silent. Acceptable since printing docs is unsupported
                    // (alert in printActiveView would surface it on the
                    // toolbar Print button anyway).
                    return;
                }
                printActiveView();
            });
        }).catch(e => console.warn('print/preview Ctrl+P interceptor load failed:', e));

        // Load the base UMD bundle (react/reactDom/rxjs + the
        // @univerjs/presets shim that defines UniverPresets + UniverCore).
        // Idempotent — safe to await once per enterMode. Both Sheets and
        // Docs flows share these globals so we never load them twice.
        let _baseLoaded = false;
        let _baseLoadingPromise = null;
        function loadUniverBaseAssets() {
            if (_baseLoaded) return Promise.resolve();
            if (_baseLoadingPromise) return _baseLoadingPromise;
            _baseLoadingPromise = (async () => {
                await _loadUniverScript(UNIVER_URLS_BASE.react);
                await _loadUniverScript(UNIVER_URLS_BASE.reactDom);
                await _loadUniverScript(UNIVER_URLS_BASE.rxjs);
                await _loadUniverScript(UNIVER_URLS_BASE.presets);
                if (typeof UniverPresets === 'undefined'
                    || typeof UniverCore === 'undefined') {
                    throw new Error('Univer base globals not found after script load');
                }
                _baseLoaded = true;
            })();
            return _baseLoadingPromise.catch(err => {
                _baseLoadingPromise = null;
                throw err;
            });
        }

        // Load the sheets-specific preset stack (core + feature presets +
        // crosshair plugin + their CSS). Cached behind sheetState.loadedSheets
        // so subsequent Sheets entries are instant.
        function loadUniverSheetsAssets() {
            if (sheetState.loadedSheets) return Promise.resolve();
            if (sheetState.loadingSheetsPromise) return sheetState.loadingSheetsPromise;
            sheetState.loadingSheetsPromise = (async () => {
                await loadUniverBaseAssets();
                // CSS in parallel — non-blocking for layout
                [UNIVER_URLS_SHEETS.cssCore, UNIVER_URLS_SHEETS.cssFilter, UNIVER_URLS_SHEETS.cssSort,
                 UNIVER_URLS_SHEETS.cssFindReplace, UNIVER_URLS_SHEETS.cssCf,
                 UNIVER_URLS_SHEETS.cssDataValidation, UNIVER_URLS_SHEETS.cssDrawing,
                 UNIVER_URLS_SHEETS.cssHyperLink,
                 UNIVER_URLS_SHEETS.cssNote, UNIVER_URLS_SHEETS.cssTable,
                 UNIVER_URLS_SHEETS.cssCrosshair].forEach(_loadUniverCss);

                // Core sheet preset + its locale
                await _loadUniverScript(UNIVER_URLS_SHEETS.core);
                await _loadUniverScript(UNIVER_URLS_SHEETS.coreLocale);
                // Optional feature presets — load best-effort; if any fail to
                // load we still proceed with whatever's available. The 2nd
                // tuple entry is the locale URL; `null` means the package
                // has no locale file (true for the crosshair-highlight
                // plugin — its labels come from base sheets-ui).
                const optional = [
                    [UNIVER_URLS_SHEETS.filter,         UNIVER_URLS_SHEETS.filterLocale],
                    [UNIVER_URLS_SHEETS.sort,           UNIVER_URLS_SHEETS.sortLocale],
                    [UNIVER_URLS_SHEETS.findReplace,    UNIVER_URLS_SHEETS.findReplaceLocale],
                    [UNIVER_URLS_SHEETS.cf,             UNIVER_URLS_SHEETS.cfLocale],
                    [UNIVER_URLS_SHEETS.dataValidation, UNIVER_URLS_SHEETS.dataValidationLocale],
                    [UNIVER_URLS_SHEETS.drawing,        UNIVER_URLS_SHEETS.drawingLocale],
                    [UNIVER_URLS_SHEETS.hyperLink,      UNIVER_URLS_SHEETS.hyperLinkLocale],
                    [UNIVER_URLS_SHEETS.note,           UNIVER_URLS_SHEETS.noteLocale],
                    [UNIVER_URLS_SHEETS.table,          UNIVER_URLS_SHEETS.tableLocale],
                    [UNIVER_URLS_SHEETS.crosshair,      null],
                ];
                for (const [js, loc] of optional) {
                    try {
                        await _loadUniverScript(js);
                        if (loc) await _loadUniverScript(loc);
                    } catch (e) {
                        console.warn('Optional Univer preset failed to load:', js, e);
                    }
                }
                if (typeof UniverPresetSheetsCore === 'undefined') {
                    throw new Error('UniverPresetSheetsCore global not found after script load');
                }
                sheetState.loadedSheets = true;
                // legacy combined flag — kept true once any stack is loaded
                sheetState.loaded = true;
            })();
            return sheetState.loadingSheetsPromise.catch(err => {
                sheetState.loadingSheetsPromise = null;
                throw err;
            });
        }

        // Load the docs-specific preset stack (preset-docs-core + its locale +
        // its CSS). Much smaller surface than sheets. Cached behind
        // sheetState.loadedDocs.
        function loadUniverDocsAssets() {
            if (sheetState.loadedDocs) return Promise.resolve();
            if (sheetState.loadingDocsPromise) return sheetState.loadingDocsPromise;
            sheetState.loadingDocsPromise = (async () => {
                await loadUniverBaseAssets();
                _loadUniverCss(UNIVER_URLS_DOCS.cssCore);
                await _loadUniverScript(UNIVER_URLS_DOCS.core);
                await _loadUniverScript(UNIVER_URLS_DOCS.coreLocale);
                if (typeof UniverPresetDocsCore === 'undefined') {
                    throw new Error('UniverPresetDocsCore global not found after script load');
                }
                sheetState.loadedDocs = true;
                sheetState.loaded = true;
            })();
            return sheetState.loadingDocsPromise.catch(err => {
                sheetState.loadingDocsPromise = null;
                throw err;
            });
        }

        // Mode-aware asset loader. Defaults to whatever sheetState.mode is
        // set to; explicit `mode` argument lets enterMode preload before
        // updating sheetState. Sheets is the back-compat default so
        // existing callers (newBlankWorkbook, openSheetFile, etc.) that
        // pass no arg still work in sheets mode.
        function loadUniverAssets(mode) {
            const m = mode || sheetState.mode || 'sheets';
            if (m === 'docs') return loadUniverDocsAssets();
            return loadUniverSheetsAssets();
        }

        // Cell value type tags used by Univer's IWorkbookData.cellData:
        //   1 = STRING, 2 = NUMBER. (Others exist for booleans/forces, not used here.)
        const UNIVER_T_STRING = 1;
        const UNIVER_T_NUMBER = 2;

        // Rows scanned to infer a column's numeric/string type. Big datasets
        // would otherwise pay O(rows) per numeric-looking column just to
        // confirm — sampling 200 rows is enough for the iSurvey schema
        // (numeric columns are uniformly numeric in practice; text columns
        // are pinned via SHEET_TEXT_KEYS). The cell loop has a per-cell
        // fallback for the rare 'numeric-by-sample but mixed' edge case.
        const TYPE_INFER_SAMPLE = 200;
        // Rows per chunk when building cellData. The overlay can repaint
        // and the browser stays responsive between chunks; 5k is small
        // enough for sub-100ms work per chunk on typical hardware while
        // keeping total yield count low (50k rows = 10 yields).
        const WORKBOOK_CHUNK = 5000;

        async function recordsToUniverWorkbook(records, columns, name, onProgress) {
            // Decide per-column type up front so a column is uniform — Univer's
            // built-in filter UI groups unique values by raw value, and mixed
            // types in one column can produce odd ordering. Sampled to
            // TYPE_INFER_SAMPLE non-blank rows; text columns (claim_no etc.)
            // are always string.
            const colTypes = columns.map((col) => {
                if (SHEET_TEXT_KEYS.has(col.key)) return 's';
                let allNumeric = true;
                let sawValue = false;
                const limit = Math.min(records.length, TYPE_INFER_SAMPLE);
                for (let i = 0; i < limit; i++) {
                    const raw = records[i][col.key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    if (typeof raw === 'string' && raw.trim() === '') continue;
                    sawValue = true;
                    const num = Number(raw);
                    if (!Number.isFinite(num)) { allNumeric = false; break; }
                }
                return (sawValue && allNumeric) ? 'n' : 's';
            });

            // cellData shape: { [rowIdx]: { [colIdx]: { v, t, s? } } }
            // Sparse — only emit non-empty cells.
            const cellData = { 0: {} };
            // Header row (row 0)
            for (let c = 0; c < columns.length; c++) {
                cellData[0][c] = {
                    v: columns[c].label,
                    t: UNIVER_T_STRING,
                    s: { bl: 1, bg: { rgb: '#f1f5f9' }, cl: { rgb: '#1e293b' } },
                };
            }
            // Data rows — chunked + async-yielding so the overlay text/
            // spinner repaints between chunks. Inner column loop is a
            // tight for() (not forEach) because it runs records.length ×
            // columns.length times; closures per cell add up to tens of
            // ms at 50k+ rows.
            const total = records.length;
            const nCols = columns.length;
            for (let i = 0; i < total; i++) {
                const rec = records[i];
                const r = i + 1;
                const row = {};
                let touched = false;
                for (let c = 0; c < nCols; c++) {
                    const raw = rec[columns[c].key];
                    if (raw === null || raw === undefined || raw === '') continue;
                    if (colTypes[c] === 'n') {
                        const num = Number(raw);
                        if (Number.isFinite(num)) {
                            row[c] = { v: num, t: UNIVER_T_NUMBER };
                        } else {
                            // Sample said numeric, this value isn't —
                            // fall back to string for THIS cell so we
                            // don't write a NaN-valued numeric cell.
                            row[c] = { v: String(raw), t: UNIVER_T_STRING };
                        }
                    } else {
                        row[c] = { v: String(raw), t: UNIVER_T_STRING };
                    }
                    touched = true;
                }
                if (touched) cellData[r] = row;
                if ((i + 1) % WORKBOOK_CHUNK === 0 && i + 1 < total) {
                    if (onProgress) onProgress(i + 1, total);
                    // setTimeout(0) gives the browser one frame to repaint
                    // the overlay text before resuming.
                    await new Promise(res => setTimeout(res, 0));
                }
            }
            if (onProgress) onProgress(total, total);

            sheetState.recordCount = records.length;
            sheetState.colCount = columns.length;

            const sheetId = 'sheet-' + Date.now();
            return {
                id: 'wb-' + Date.now(),
                name: name || 'SE Report Workbook',
                appVersion: '0.10.0',
                locale: 'enUS',
                sheetOrder: [sheetId],
                sheets: {
                    [sheetId]: {
                        id: sheetId,
                        name: 'Sheet1',
                        rowCount: Math.max(records.length + 50, 200),
                        columnCount: Math.max(columns.length + 5, 26),
                        cellData,
                        mergeData: [],
                        freeze: { startRow: 1, startColumn: 0, ySplit: 1, xSplit: 0 },
                        defaultColumnWidth: 110,
                        defaultRowHeight: 24,
                    },
                },
                styles: {},
                resources: [],
            };
        }

        function mountUniver(workbookData, label) {
            const host = document.getElementById('univerHost');
            setSheetEmptyVisible(false);

            // Dispose previous Univer instance, if any. Easier than swapping
            // workbook in-place since createWorkbook in Univer can leave the
            // prior unit around.
            if (sheetState.univer) {
                try { sheetState.univer.dispose(); } catch (e) { console.warn(e); }
                sheetState.univer = null;
                sheetState.univerAPI = null;
                sheetState.mounted = false;
            }
            // Clear any leftover mount children (preserve overlay/empty msg)
            Array.from(host.childNodes).forEach(node => {
                if (node.id !== 'sheetLoadingOverlay' && node.id !== 'sheetEmptyMessage') {
                    host.removeChild(node);
                }
            });
            const mountDiv = document.createElement('div');
            mountDiv.id = 'univerMount';
            host.appendChild(mountDiv);

            const { createUniver } = UniverPresets;
            const { LocaleType, mergeLocales } = UniverCore;

            const isDocs = sheetState.mode === 'docs';
            const presets = [];
            const localeBits = [];

            if (isDocs) {
                // Docs mode: just preset-docs-core. No feature presets yet
                // (filter/sort/etc. are sheets-specific) and no crosshair
                // plugin.
                if (typeof UniverPresetDocsCore === 'undefined'
                    || typeof UniverPresetDocsCore.UniverDocsCorePreset !== 'function') {
                    throw new Error('UniverPresetDocsCore missing — docs assets not loaded');
                }
                presets.push(UniverPresetDocsCore.UniverDocsCorePreset({ container: 'univerMount' }));
                if (typeof UniverPresetDocsCoreEnUS !== 'undefined') {
                    localeBits.push(UniverPresetDocsCoreEnUS);
                }
            } else {
                // Sheets mode: core sheet preset + every optional feature
                // preset that loaded successfully.
                presets.push(UniverPresetSheetsCore.UniverSheetsCorePreset({ container: 'univerMount' }));
                localeBits.push(typeof UniverPresetSheetsCoreEnUS !== 'undefined' ? UniverPresetSheetsCoreEnUS : {});
                // Add optional presets that were loaded successfully. Naming
                // follows Univer's convention: package @univerjs/preset-sheets-X
                // exposes window.UniverPresetSheetsX and UniverPresetSheetsXEnUS.
                const opt = [
                    ['UniverPresetSheetsFilter',              'UniverSheetsFilterPreset',              'UniverPresetSheetsFilterEnUS'],
                    ['UniverPresetSheetsSort',                'UniverSheetsSortPreset',                'UniverPresetSheetsSortEnUS'],
                    ['UniverPresetSheetsFindReplace',         'UniverSheetsFindReplacePreset',         'UniverPresetSheetsFindReplaceEnUS'],
                    ['UniverPresetSheetsConditionalFormatting','UniverSheetsConditionalFormattingPreset','UniverPresetSheetsConditionalFormattingEnUS'],
                    ['UniverPresetSheetsDataValidation',       'UniverSheetsDataValidationPreset',       'UniverPresetSheetsDataValidationEnUS'],
                    ['UniverPresetSheetsDrawing',              'UniverSheetsDrawingPreset',              'UniverPresetSheetsDrawingEnUS'],
                    ['UniverPresetSheetsHyperLink',            'UniverSheetsHyperLinkPreset',            'UniverPresetSheetsHyperLinkEnUS'],
                    ['UniverPresetSheetsNote',                 'UniverSheetsNotePreset',                 'UniverPresetSheetsNoteEnUS'],
                    ['UniverPresetSheetsTable',                'UniverSheetsTablePreset',                'UniverPresetSheetsTableEnUS'],
                ];
                for (const [ns, preset, locale] of opt) {
                    const nsObj = window[ns];
                    if (nsObj && typeof nsObj[preset] === 'function') {
                        try { presets.push(nsObj[preset]()); } catch (e) {
                            console.warn(`Univer preset ${preset} init failed`, e);
                        }
                    }
                    if (window[locale]) localeBits.push(window[locale]);
                }
            }

            const { univer, univerAPI } = createUniver({
                locale: LocaleType.EN_US,
                locales: { [LocaleType.EN_US]: mergeLocales.apply(null, localeBits) },
                presets,
            });

            if (!isDocs) {
                // crosshair-highlight is a lower-level plugin (no preset bundle).
                // Register it AFTER createUniver but BEFORE createWorkbook so the
                // plugin gets initialised against the same DI container that the
                // workbook will hook into. Wrapped in try/catch since the script
                // load is best-effort (no-op if the optional CDN fetch failed).
                try {
                    const chNs = window.UniverSheetsCrosshairHighlight;
                    if (chNs && chNs.UniverSheetsCrosshairHighlightPlugin) {
                        univer.registerPlugin(chNs.UniverSheetsCrosshairHighlightPlugin);
                    }
                } catch (e) {
                    console.warn('crosshair-highlight registration failed:', e);
                }
                univerAPI.createWorkbook(workbookData);

                // Copy Data tab's ribbon items into the Start tab's ribbon so
                // users get filter / sort / find / table / dv / cf / text-to-
                // number without having to switch tabs. Items get registered
                // by their plugins AFTER createWorkbook — and some preset
                // bundles (filter / sort / find-replace / data-validation)
                // register asynchronously, so a small delay lets the schema
                // settle before we copy from it. mergeMenu emits menuChanged$
                // which the ribbon subscribes to and re-renders with our
                // additions, so timing-after-render is fine.
                setTimeout(() => {
                    patchStartRibbonWithDataTools(univer);
                    patchStartRibbonWithInsertTools(univer);
                }, 500);
            } else {
                // Docs mode — `workbookData` is actually an IDocumentData
                // snapshot (or empty object). The facade exposes
                // createUniverDoc on 0.22.x.
                try {
                    univerAPI.createUniverDoc(workbookData || {});
                } catch (e) {
                    console.error('createUniverDoc failed, retrying with empty doc:', e);
                    univerAPI.createUniverDoc({});
                }
            }

            sheetState.univer = univer;
            sheetState.univerAPI = univerAPI;
            sheetState.currentData = workbookData;
            sheetState.sourceLabel = label || '';
            sheetState.mounted = true;
            // Crosshair plugin starts off after a fresh mount — toggle state
            // doesn't carry over because we create a brand-new Univer instance.
            sheetState.crosshairOn = false;
            setSheetDirty(false);
            setSheetStatus(label || '');
            // Inject the Crosshair toggle into Univer's tab bar (sheets only)
            // + the file-ops button group at the head of the ribbon
            // row. Univer renders the tab bar / ribbon asynchronously after
            // createWorkbook so wait a tick for the DOM to settle.
            setTimeout(() => {
                if (!isDocs) injectCrosshairTab();
                injectFileOpsIntoUniverRibbon();
            }, 150);

            // Attach a dirty-tracking listener. Univer's command system fires
            // for every mutation (type === 2 in the CommandType enum). We
            // suppress dirty marking for the first 500ms because the initial
            // createWorkbook itself dispatches commands.
            //
            // The 500ms window alone isn't enough — Univer keeps firing
            // internal mutations long after mount finishes:
            //   - doc.mutation.rich-text-editing  → in sheets mode this is
            //     the cell-editor sub-doc init (each cell has an embedded
            //     doc editor; it (re)initializes when the canvas finishes
            //     async rendering, ~1s post-mount). In docs mode it IS the
            //     user typing in the doc body, so we only filter it when
            //     not in docs mode.
            //   - formula.mutation.set-formula-calculation-*  → formula
            //     engine kickoff / recalc notifications, fire in a burst
            //     around T+1s once fonts/render settle. Sheets-only noise.
            // Without an ID filter, just opening Univer and immediately
            // clicking Open triggers the "unsaved changes" confirm. Real
            // cell edits commit through sheet.mutation.set-range-values
            // (sheets) or genuine doc.mutation.* keystrokes (docs) which
            // still flip dirty, so this filter only drops init noise.
            const mountedAt = Date.now();
            try {
                if (typeof univerAPI.onCommandExecuted === 'function') {
                    univerAPI.onCommandExecuted((cmd) => {
                        if (Date.now() - mountedAt < 500) return;
                        // type === 2 is "Mutation" in Univer's CommandType enum
                        if (!cmd || (cmd.type !== 2 && cmd.type !== 'mutation')) return;
                        if (typeof cmd.id !== 'string') return;
                        if (cmd.id.startsWith('formula.mutation.')) return;
                        if (sheetState.mode !== 'docs'
                            && cmd.id.startsWith('doc.mutation.')) return;
                        if (!sheetState.dirty) setSheetDirty(true);
                    });
                }
            } catch (e) {
                console.warn('Failed to attach Univer change listener:', e);
            }

            // Intercept Sort Ascending / Descending so we sort the whole data
            // region (rows 1..N × all cols) keyed off the user's selected
            // column, instead of letting Univer sort only the selected range
            // (which leaves the other columns frozen and breaks row order).
            // Throwing from the pre-hook cancels the original command in
            // Univer 0.22.x; if a future version changes that, the fallback
            // sort still runs and overwrites whatever the original did.
            // Sheets-only — docs mode has no sort commands.
            if (!isDocs) try {
                if (typeof univerAPI.onBeforeCommandExecute === 'function') {
                    univerAPI.onBeforeCommandExecute((cmd) => {
                        if (!cmd || !cmd.id) return;
                        if (sheetState._sortGuard) return; // ignore mutations our own sort dispatches
                        const id = cmd.id;
                        const asc = (id === 'sheet.command.sort-range-asc'
                            || id === 'sheet.command.sort-range-asc-ext');
                        const desc = (id === 'sheet.command.sort-range-desc'
                            || id === 'sheet.command.sort-range-desc-ext');
                        if (!asc && !desc) return;
                        sheetState._sortGuard = true;
                        Promise.resolve()
                            .then(() => _runFullSheetSort(asc))
                            .catch(e => console.error('Full-data sort failed:', e))
                            .finally(() => { sheetState._sortGuard = false; });
                        throw new Error('SE_SORT_INTERCEPTED'); // cancel Univer's partial sort
                    });
                }
            } catch (e) {
                console.warn('Failed to attach sort interceptor:', e);
            }
        }

        // ===== Launcher / mode navigation =====
        // The page now opens on a 3-card launcher (Sheets / Docs / Slides);
        // picking a card runs enterMode(), which lazy-loads the matching
        // preset stack and mounts a blank document. Home button in the
        // Univer ribbon round-trips back to the launcher via goHome().
        function _setAppTitleForMode(mode) {
            const t = document.getElementById('appTitle');
            if (!t) return;
            t.textContent = mode === 'docs' ? 'SE OFFICE — Documents'
                          : mode === 'sheets' ? 'SE OFFICE — Sheets'
                          : 'SE OFFICE';
        }

        function showLauncher() {
            const launcher = document.getElementById('launcher');
            const sv = document.getElementById('spreadsheetView');
            if (launcher) launcher.style.display = 'flex';
            if (sv) sv.style.display = 'none';
            _setAppTitleForMode(null);
        }

        // Tear down the current Univer instance + state and return to the
        // launcher. Internal — does NOT prompt for dirty (callers via
        // navigateTo / the hashchange listener have already gated on that).
        function _doGoHome() {
            if (sheetState.univer) {
                try { sheetState.univer.dispose(); } catch (e) { console.warn(e); }
            }
            // Disconnect ribbon/tab observers so they don't keep firing
            // against the disposed Univer DOM. They'll be re-attached the
            // next time injectFileOpsIntoUniverRibbon / injectCrosshairTab
            // runs (inside mountUniver) after the user picks a mode again.
            if (_crosshairTabObserver) {
                try { _crosshairTabObserver.disconnect(); } catch {}
                _crosshairTabObserver = null;
            }
            if (_fileOpsObserver) {
                try { _fileOpsObserver.disconnect(); } catch {}
                _fileOpsObserver = null;
            }
            sheetState.univer = null;
            sheetState.univerAPI = null;
            sheetState.mounted = false;
            sheetState.dirty = false;
            sheetState.currentData = null;
            sheetState.mode = null;
            sheetState.fileHandle = null;
            sheetState.fileName = null;
            sheetState.fileKind = null;
            sheetState.recordCount = 0;
            sheetState.colCount = 0;
            sheetState.crosshairOn = false;
            sheetState.sourceLabel = '';
            // Clear out the mount div so a return entry doesn't re-render
            // into stale DOM. Preserve the overlay/empty-msg children.
            const host = document.getElementById('univerHost');
            if (host) {
                Array.from(host.childNodes).forEach(node => {
                    if (node.id !== 'sheetLoadingOverlay'
                        && node.id !== 'sheetEmptyMessage') host.removeChild(node);
                });
            }
            setSheetOverlay(false);
            showLauncher();
        }

        // Pick a mode and bootstrap a blank document inside it. Internal —
        // does NOT prompt for dirty (the routing layer in navigateTo /
        // hashchange already gated on that). Hides the launcher, shows the
        // editor view, lazy-loads the preset stack + mounts a blank doc.
        async function _doEnterMode(mode) {
            if (mode !== 'sheets' && mode !== 'docs') {
                console.warn('Unsupported mode:', mode);
                return;
            }
            const launcher = document.getElementById('launcher');
            const sv = document.getElementById('spreadsheetView');
            if (launcher) launcher.style.display = 'none';
            if (sv) sv.style.display = 'flex';
            _setAppTitleForMode(mode);
            sheetState.mode = mode;
            sheetState.mounted = false;
            try {
                setSheetEmptyVisible(false);
                setSheetOverlay(true,
                    mode === 'docs'
                        ? 'กำลังโหลด Univer Documents...'
                        : 'กำลังโหลด Univer Sheets...');
                await loadUniverAssets(mode);
                if (mode === 'docs') {
                    mountUniver(blankDocSnapshot(), 'เอกสารใหม่');
                } else {
                    mountUniver(blankWorkbookSnapshot(), 'ไฟล์ใหม่');
                }
                setSheetFile(null, null, null);
                setSheetDirty(false);
            } catch (e) {
                console.error('_doEnterMode failed:', e);
                alert('โหลด Univer ไม่สำเร็จ: ' + (e && e.message || e));
                setSheetStatus('โหลด Univer ไม่สำเร็จ — เช็คเน็ต/unpkg');
            } finally {
                setSheetOverlay(false);
            }
        }

        // ---- History API routing ----------------------------------------
        // Three named paths drive the app — bookmarkable, refresh-safe, and
        // browser-history aware. Each card click + the Home ribbon button
        // route through navigateTo() which calls history.pushState(); the
        // single popstate listener below handles browser back/forward.
        // Both code paths funnel into _handleRouteChange() which is the
        // only thing that actually mounts / disposes Univer.
        //
        // Server requirement: nginx must SPA-fallback unknown paths to
        // index.html so a hard refresh on /sheets returns the app (nginx.conf
        // has try_files $uri $uri/ /index.html for this).
        const ROUTES = {
            HOME:   '/',
            SHEETS: '/sheets',
            DOCS:   '/docs',
        };
        function _routeToMode(pathname) {
            if (pathname === ROUTES.SHEETS) return 'sheets';
            if (pathname === ROUTES.DOCS)   return 'docs';
            return null; // home / unknown
        }
        function _modeToRoute(mode) {
            if (mode === 'sheets') return ROUTES.SHEETS;
            if (mode === 'docs')   return ROUTES.DOCS;
            return ROUTES.HOME;
        }
        function _currentPath() {
            return location.pathname || ROUTES.HOME;
        }
        // Tracks the path we last saw apply cleanly so that a "cancel" on
        // the dirty-prompt during a browser-back can roll the URL back
        // via history.replaceState (which doesn't refire popstate).
        let _lastAppliedPath = ROUTES.HOME;
        // True for the brief window where we are about to push state
        // ourselves — distinguishes our own navigation (already gated on
        // dirty) from external back/forward navigation that still needs
        // a confirm prompt.
        let _navigatingProgrammatically = false;

        // Public API: switch route. Confirms once if there are unsaved
        // edits; on accept, pushes the path and runs the route handler.
        // pushState does NOT fire popstate so we call _handleRouteChange
        // manually right after.
        function navigateTo(mode) {
            const target = _modeToRoute(mode);
            if (_currentPath() === target) return;
            if (sheetState.dirty && !confirm(
                'มีการแก้ไขที่ยังไม่ได้บันทึก — ออกจาก editor จะเสีย\n\nต้องการต่อ?'
            )) return;
            _navigatingProgrammatically = true;
            history.pushState(null, '', target);
            _handleRouteChange();
        }

        // Back-compat shims for callers that pre-date the routing layer.
        // The file-ops ribbon binds Home → goHome by name; launcher cards
        // historically called enterMode(mode) directly. Both still work
        // and route through navigateTo so URL stays authoritative.
        function goHome()          { navigateTo(null); }
        function enterMode(mode)   { navigateTo(mode); }

        function _handleRouteChange() {
            const targetMode  = _routeToMode(_currentPath());
            const currentMode = sheetState.mode;
            if (targetMode === currentMode) {
                _navigatingProgrammatically = false;
                _lastAppliedPath = _currentPath();
                return;
            }
            // Browser back/forward path — navigateTo wasn't involved, so
            // dirty wasn't gated yet. Confirm here; on cancel, roll the
            // URL back without re-firing popstate (replaceState is silent).
            if (!_navigatingProgrammatically && sheetState.dirty) {
                if (!confirm(
                    'มีการแก้ไขที่ยังไม่ได้บันทึก — ออกจากหน้านี้จะเสีย\n\nต้องการต่อ?'
                )) {
                    history.replaceState(null, '', _lastAppliedPath);
                    return;
                }
            }
            _navigatingProgrammatically = false;
            _lastAppliedPath = _currentPath();
            // Dispose previous mount first when switching mode-to-mode;
            // _doEnterMode itself doesn't tear down the prior Univer.
            if (currentMode && targetMode !== currentMode) _doGoHome();
            if (targetMode) {
                _doEnterMode(targetMode);
            } else {
                _doGoHome();
            }
        }
        window.addEventListener('popstate', _handleRouteChange);

        // Minimum-viable IWorkbookData for a blank Sheet1. Mirrors the
        // shape recordsToUniverWorkbook returns (so mountUniver doesn't
        // see a different schema) but with an empty cellData and no
        // freeze pane — there's no header row to pin.
        function blankWorkbookSnapshot() {
            const sheetId = 'sheet-' + Date.now();
            return {
                id: 'wb-' + Date.now(),
                name: 'Untitled',
                appVersion: '0.10.0',
                locale: 'enUS',
                sheetOrder: [sheetId],
                sheets: {
                    [sheetId]: {
                        id: sheetId,
                        name: 'Sheet1',
                        rowCount: 200,
                        columnCount: 26,
                        cellData: {},
                        mergeData: [],
                        defaultColumnWidth: 110,
                        defaultRowHeight: 24,
                    },
                },
                styles: {},
                resources: [],
            };
        }

        // Minimum-viable IDocumentData for a blank doc. Univer's docs preset
        // also accepts `{}` and fills in defaults; we provide the explicit
        // shape so subsequent Save → getSnapshot → re-open round-trips have
        // a stable id + body to write into. paragraphs[0] uses startIndex=0
        // pointing at the dataStream "\r\n" terminator.
        function blankDocSnapshot() {
            return {
                id: 'doc-' + Date.now(),
                documentStyle: {},
                body: {
                    dataStream: '\r\n',
                    textRuns: [],
                    paragraphs: [{ startIndex: 0 }],
                },
            };
        }

        // Mode-aware "create blank document". Sheets mode → blank workbook;
        // Docs mode → blank IDocumentData. Other UI (file-ops "New" button +
        // legacy onclick="newBlankWorkbook()" in the empty-state) call into
        // this; the old name stays as an alias so existing call sites keep
        // working.
        async function newBlank() {
            if (sheetState.dirty && !confirm(
                'มีการแก้ไขที่ยังไม่ได้บันทึก — สร้างไฟล์ใหม่จะทับของเดิม\n\nต้องการต่อ?'
            )) return;
            const mode = sheetState.mode || 'sheets';
            try {
                setSheetOverlay(true, mode === 'docs'
                    ? 'กำลังสร้างเอกสารว่าง...'
                    : 'กำลังสร้าง workbook ว่าง...');
                await loadUniverAssets(mode);
                sheetState.mounted = false;
                const snap = mode === 'docs' ? blankDocSnapshot() : blankWorkbookSnapshot();
                mountUniver(snap, mode === 'docs' ? 'เอกสารใหม่' : 'ไฟล์ใหม่');
                // Blank workbook isn't bound to any disk file — clear the
                // handle so Save prompts for a destination.
                setSheetFile(null, null, null);
                setSheetDirty(false);
                sheetState.recordCount = 0;
                sheetState.colCount = 0;
            } catch (e) {
                console.error(e);
                alert('สร้างไฟล์ใหม่ไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                setSheetOverlay(false);
            }
        }
        // Back-compat alias — empty-state HTML + injected file-ops still
        // refer to newBlankWorkbook() by name.
        const newBlankWorkbook = newBlank;

        function tsForFilename() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
        }

        // Force-commit any in-progress cell editor before we snapshot.
        // Univer keeps typed-but-uncommitted values in the editor's local
        // state until Enter / Tab / blur fires — and save() / getSnapshot()
        // do NOT see those pending edits. Without this call, hitting Save
        // while the user is still mid-type silently writes the pre-edit
        // workbook to disk and the user reopens to find their data gone.
        //
        // eventType 3 = exit-on-keyboard, keycode 13 = Enter; together they
        // mimic the user pressing Enter to commit. Sheets-only — Univer
        // Docs has its own editor and the command name is sheets-specific,
        // so docs mode skips. Failure is non-fatal (older Univer builds may
        // not have the command yet); fall through and snapshot whatever
        // state we can.
        async function commitActiveCellEdit() {
            if (sheetState.mode !== 'sheets') return;
            if (!sheetState.univerAPI) return;
            try {
                await sheetState.univerAPI.executeCommand(
                    'sheet.operation.set-cell-edit-visible',
                    { visible: false, eventType: 3, keycode: 13 }
                );
            } catch (e) {
                console.warn('commitActiveCellEdit failed (continuing):', e);
            }
        }

        // Pull the latest workbook / document snapshot from Univer's facade
        // API. Branches on sheetState.mode — sheets uses getActiveWorkbook,
        // docs uses getActiveDocument. Falls back to sheetState.currentData
        // if the facade isn't ready (e.g. before first mount).
        //
        // Univer renamed FWorkbook.getSnapshot() → FWorkbook.save() and the
        // old method now logs a deprecation warning AND may return the
        // original mount snapshot without the user's edits — which silently
        // saves a blank workbook. Prefer save() when available; fall back
        // to getSnapshot() only on older Univer builds that haven't shipped
        // the rename yet.
        function getCurrentUniverSnapshot() {
            if (sheetState.univerAPI) {
                try {
                    if (sheetState.mode === 'docs') {
                        const fDoc = typeof sheetState.univerAPI.getActiveDocument === 'function'
                            ? sheetState.univerAPI.getActiveDocument()
                            : null;
                        if (fDoc) {
                            if (typeof fDoc.save === 'function') return fDoc.save();
                            if (typeof fDoc.getSnapshot === 'function') return fDoc.getSnapshot();
                        }
                    } else {
                        const fWb = sheetState.univerAPI.getActiveWorkbook();
                        if (fWb) {
                            if (typeof fWb.save === 'function') return fWb.save();
                            if (typeof fWb.getSnapshot === 'function') return fWb.getSnapshot();
                        }
                    }
                } catch (e) {
                    console.warn('snapshot failed:', e);
                }
            }
            return sheetState.currentData;
        }

        // Build a JSON blob from the current Univer snapshot. Cheap — just
        // a snapshot + stringify. Returns null if there's nothing to save.
        // Validates shape per mode: sheets snapshot must have `.sheets`,
        // docs snapshot must have `.body` (or at minimum be a non-null
        // object).
        function buildSheetJsonBlob() {
            const snapshot = getCurrentUniverSnapshot();
            if (!snapshot) return null;
            if (sheetState.mode === 'docs') {
                if (typeof snapshot !== 'object') return null;
            } else {
                if (!snapshot.sheets) return null;
            }
            sheetState.currentData = snapshot;
            const json = JSON.stringify(snapshot);
            return new Blob([json], { type: 'application/json' });
        }

        // Build an XLSX blob via xlsx-js-style. Loads the CDN bundle on
        // first call. Preserves cell-level styles (borders / fills /
        // fonts / alignment) so an open-edit-save round-trip on an .xlsx
        // doesn't strip the formatting the user imported. Returns null
        // if the workbook has no cells worth writing.
        async function buildSheetXlsxBlob() {
            const snapshot = getCurrentUniverSnapshot();
            if (!snapshot || !snapshot.sheets) return null;
            await loadSheetJsAssets();
            const workbookStyles = snapshot.styles || {};
            const wb = XLSX.utils.book_new();
            // Save EVERY sheet — used to only emit sheetOrder[0], which
            // meant a multi-sheet workbook lost everything but the first
            // tab on a save+reopen round-trip.
            const sheetIds = (snapshot.sheetOrder && snapshot.sheetOrder.length)
                ? snapshot.sheetOrder
                : Object.keys(snapshot.sheets);
            let totalCells = 0;
            for (let i = 0; i < sheetIds.length; i++) {
                const sheetId = sheetIds[i];
                const sheet = snapshot.sheets[sheetId];
                if (!sheet) continue;
                const cellData = sheet.cellData || {};
                // Sparse walk — avoids the ~2.5M-string dense pre-fill that a
                // 50k×49 workbook would otherwise need; iterate only the cells
                // that actually exist. Cells with style-only content (empty
                // value but a border / fill / etc) are emitted too so the
                // formatting survives — without that, a fully-bordered empty
                // template row would lose its outline on save.
                const ws = {};
                let maxR = -1, maxC = -1;
                for (const rkey in cellData) {
                    if (!Object.prototype.hasOwnProperty.call(cellData, rkey)) continue;
                    const ri = +rkey;
                    const rowCells = cellData[rkey];
                    for (const ckey in rowCells) {
                        if (!Object.prototype.hasOwnProperty.call(rowCells, ckey)) continue;
                        const ci = +ckey;
                        const cell = rowCells[ckey];
                        const v = cell && cell.v;
                        const hasValue = !(v === null || v === undefined || v === '');
                        const xs = cell && cell.s
                            ? _univerStyleToXlsx(cell.s, workbookStyles)
                            : null;
                        if (!hasValue && !xs) continue;
                        if (ri > maxR) maxR = ri;
                        if (ci > maxC) maxC = ci;
                        const addr = XLSX.utils.encode_cell({ r: ri, c: ci });
                        const xCell = {};
                        if (hasValue) {
                            xCell.v = v;
                            xCell.t = (typeof v === 'number' && Number.isFinite(v)) ? 'n' : 's';
                        } else {
                            // Style-only cell — emit an empty string so the
                            // writer keeps the cell node + applies the style.
                            xCell.v = '';
                            xCell.t = 's';
                        }
                        if (xs) xCell.s = xs;
                        ws[addr] = xCell;
                    }
                }
                if (maxR < 0 || maxC < 0) continue;
                ws['!ref'] = XLSX.utils.encode_range({
                    s: { r: 0, c: 0 }, e: { r: maxR, c: maxC },
                });
                // Translate Univer's mergeData → SheetJS's !merges so
                // merged cells survive the round-trip. Without this,
                // re-opening the saved xlsx would show the title row
                // unmerged with the text overflowing into the next cell.
                const merges = (sheet.mergeData || []).map(m => ({
                    s: { r: m.startRow, c: m.startColumn },
                    e: { r: m.endRow, c: m.endColumn },
                }));
                if (merges.length) ws['!merges'] = merges;
                XLSX.utils.book_append_sheet(wb, ws, sheet.name || `Sheet${i + 1}`);
                totalCells++;
            }
            if (totalCells === 0) return null;
            const arrBuf = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
            return new Blob([arrBuf], {
                type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            });
        }

        // Save = overwrite the currently-open file in its original format.
        // No handle yet (fresh fetch, or browser without FS Access API and
        // never-saved) → fall through to Save As so the user can pick a
        // destination. This matches Office's "Save on a never-saved doc
        // opens Save As" flow.
        //
        // NOTE: not named "saveAs" / "save" — xlsx-js-style's writeFile
        // internally calls window.saveAs (the FileSaver.js convention) to
        // trigger the download. A top-level function named saveAs would
        // shadow that and Excel exports would fall through to our sheet-
        // save flow, surfacing "ยังไม่มี workbook ให้บันทึก" when there
        // is no Univer mount. Kept the saveSheet* prefix for clarity.
        async function saveSheetFile() {
            if (!sheetState.mounted) {
                alert(sheetState.mode === 'docs'
                    ? 'ยังไม่มีเอกสารให้บันทึก'
                    : 'ยังไม่มี workbook ให้บันทึก');
                return;
            }
            if (sheetState.saving) return;
            if (!sheetState.fileHandle || !sheetState.fileKind) {
                return saveSheetAs();
            }
            // Keep `saving = true` + the loader call inside try so finally
            // always resets the flag even if the CDN fetch for the file-io
            // pickers module rejects. Otherwise the flag would latch on and
            // every subsequent Save click would early-return silently.
            sheetState.saving = true;
            try {
                await loadFileIoPickersAssets();
                // Flush in-progress cell editor into the workbook state
                // before snapshotting — see commitActiveCellEdit() docs.
                await commitActiveCellEdit();
                // Docs mode only ever writes JSON; the xlsx branch is
                // sheets-only. Force-coerce here in case a stale handle
                // somehow surfaces an xlsx kind in docs mode.
                const kind = sheetState.mode === 'docs'
                    ? 'json'
                    : sheetState.fileKind;
                setSheetOverlay(true, kind === 'xlsx'
                    ? 'กำลังเขียน .xlsx...'
                    : 'กำลังเขียน .univer.json...');
                const blob = kind === 'xlsx'
                    ? await buildSheetXlsxBlob()
                    : buildSheetJsonBlob();
                if (!blob) {
                    alert('Sheet ว่างเปล่า');
                    return;
                }
                await SeShared.fileIo.pickers.writeBlobToHandle(sheetState.fileHandle, blob);
                setSheetDirty(false);
                setSheetStatus(
                    `บันทึก: ${sheetState.fileName} `
                    + `(${(blob.size / 1024 / 1024).toFixed(2)} MB)`
                );
            } catch (e) {
                // Stale-handle recovery: drop the dead handle and
                // re-route to Save As so the user can pick the file
                // again (Chrome can't always recover an old handle once
                // its cached state is out of sync with disk).
                if (SeShared.fileIo.pickers.isStaleHandleError(e)) {
                    console.warn('handle stale, falling back to Save As:', e);
                    const stalefileName = sheetState.fileName;
                    setSheetOverlay(false);
                    setSheetFile(null, null, null);
                    alert(
                        `ไฟล์ "${stalefileName}" ถูกแตะจากภายนอกหรือเชื่อมต่อหาย — `
                        + 'กรุณาเลือกที่บันทึกอีกครั้ง'
                    );
                    return saveSheetAs();
                }
                console.error(e);
                alert('บันทึกไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                setSheetOverlay(false);
                sheetState.saving = false;
            }
        }

        // Save As = pick a new location + format and (re)bind the handle
        // for future 1-click Saves. Bundles both formats in the picker so
        // the user switches via the type dropdown; the resulting filename
        // extension is what tells us which blob to build. Falls back to a
        // confirm-based prompt + download on browsers without FS Access.
        async function saveSheetAs() {
            if (!sheetState.mounted) {
                alert(sheetState.mode === 'docs'
                    ? 'ยังไม่มีเอกสารให้บันทึก'
                    : 'ยังไม่มี workbook ให้บันทึก');
                return;
            }
            if (sheetState.saving) return;
            // Same finally-safety rationale as saveSheetFile — loader call
            // must live inside try so a CDN failure doesn't leave `saving`
            // latched on forever.
            sheetState.saving = true;
            const isDocsMode = sheetState.mode === 'docs';
            try {
                await loadFileIoPickersAssets();
                // Same rationale as saveSheetFile — flush any pending cell
                // editor value before snapshotting.
                await commitActiveCellEdit();
                if (window.showSaveFilePicker) {
                    // Suggest the current basename so re-Save-As to a new
                    // path / format starts with something recognizable.
                    const baseName = sheetState.fileName
                        ? sheetState.fileName.replace(
                            /\.(se\.json|se|univer\.json|json|xlsx|xls)$/i, '')
                        : (isDocsMode
                            ? `Untitled_Document_${tsForFilename()}`
                            : `SE_Report_workbook_${tsForFilename()}`);
                    const isXlsxSource = !isDocsMode && sheetState.fileKind === 'xlsx';
                    const suggested = isDocsMode
                        ? baseName + '.univer.json'
                        : (isXlsxSource ? baseName + '.xlsx' : baseName + '.se.json');
                    // Order matters: the first type sits at the top of the
                    // dropdown and is pre-selected. Docs mode only offers
                    // JSON; sheets mode bundles xlsx + json with the source
