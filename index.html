<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Univer Spreadsheet</title>
    <!-- IBM Plex used by the Page Setup modal's "Print UI" design. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- SheetJS, jsPDF + Sarabun, PDF.js, and Univer are ALL lazy-loaded
         on demand from CDN. No backend required. -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a; color: #e2e8f0;
            display: flex; height: 100vh; overflow: hidden;
        }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Toolbar */
        .toolbar {
            padding: 10px 18px; background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .toolbar h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-right: auto; }

        /* Content area */
        .content { flex: 1; overflow: hidden; padding: 0; display: flex; flex-direction: column; }

        /* Spreadsheet (Univer) — theme-immune.
           Univer's filter dropdowns and popovers inherit `color` from
           ancestors. When the app runs in dark theme, body's light text
           color can bleed through making popovers nearly invisible. The
           whole spreadsheet subtree is forced to an always-light palette
           so it stays readable regardless of the dark/light toggle. */
        #spreadsheetView {
            display: none;
            flex: 1; min-height: 0;
            flex-direction: column;
            color: #1e293b;  /* break dark-theme color inheritance */
        }
        /* Crosshair toggle injected as a 5th tab in Univer's tab bar
           (next to Start/Insert/Formulas/Data). Sits in the same flex row
           as the real tabs but does NOT carry role="tab" so Univer's
           ribbon doesn't try to switch panels when it's clicked.
           Default styling mirrors the real tabs at rest; amber "active"
           palette when the highlight is on — same visual story as the
           fast-user chip in the page header. */
        .univer-crosshair-tab {
            padding: 4px 12px;
            font-size: 13px;
            border: 1px solid transparent;
            background: transparent;
            color: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            line-height: 1.2;
            white-space: nowrap;
        }
        .univer-crosshair-tab:hover { background: rgba(15, 23, 42, 0.06); }
        .univer-crosshair-tab.active {
            background: #fef3c7;
            border-color: #fbbf24;
            color: #92400e;
        }
        .univer-crosshair-tab.active:hover { background: #fde68a; }
        /* File-ops button group injected at the head of Univer's ribbon row
           (left of Undo). Holds Refresh Data / Open / Save / Save XLSX +
           a dirty indicator. Visual style mirrors Univer's own buttons —
           a thin border + light hover — except Save which is the page's
           primary action and gets the blue palette. */
        .se-file-ops {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 6px;
            margin-right: 6px;
            border-right: 1px solid #e5e7eb;
            height: 28px;
            width: max-content;
            flex-shrink: 0;
            background: #fff;
        }
        /* When the file-ops wrap is a direct grid-child of the ribbon row,
           override the row's grid template so our wrap gets just its
           content width and Univer's inner ribbon claims the remaining
           1fr. Without this Univer assigns the inner div to min-content
           (~32px → only the overflow ⋮ shows) and gives the rest to us. */
        .se-ribbon-has-fileops {
            grid-template-columns: max-content 1fr !important;
        }
        .se-file-ops button {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 7px;
            font-size: 12px;
            border: 1px solid transparent;
            border-radius: 4px;
            background: transparent;
            color: #1e293b;
            cursor: pointer;
            font-family: inherit;
            line-height: 1.4;
            transition: background 0.12s;
        }
        /* Borderless at rest, soft slate fill on hover — mirrors the
           Univer ribbon's own toolbar buttons (sitting just to the
           right) so the file-ops row reads as part of the same toolbar. */
        .se-file-ops button:hover {
            background: #f1f5f9;
        }
        .se-file-ops button svg {
            width: 16px; height: 16px;
            display: block; flex-shrink: 0;
        }
        /* Refresh icon (Refresh Data button) — green to signal "load fresh" */
        .se-file-ops button[data-op="refresh"] svg { color: #16a34a; }
        /* Save / Save XLSX get colored icons + a transparent button so the
           icon carries the visual weight (no more blue-filled Save). */
        .se-file-ops button[data-op="save"] svg { color: #2563eb; }
        /* Save As shares the blue palette with Save (same operation
           family) — just a lighter shade to hint at the secondary role. */
        .se-file-ops button[data-op="saveas"] svg { color: #60a5fa; }
        /* New workbook — neutral slate (it's not a destructive nor a
           save-family action; same visual weight as Open). */
        .se-file-ops button[data-op="new"] svg { color: #475569; }

        /* ---- Page Setup modal --------------------------------------
           Centered overlay over the whole viewport. Light-only — the
           Sheet view is force-light (see #spreadsheetView color override)
           so we don't carry the app's dark theme into the modal either. */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #1e293b;
        }
        .modal-card {
            background: #fff;
            border-radius: 8px;
            width: 100%; max-width: 460px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            font-size: 14px;
            max-height: 90vh;
            display: flex; flex-direction: column;
        }
        /* Page Setup modal CSS lives in SeShared.print.pageSetup — the
           shared module injects its own scoped styles when init() runs.
           A removed inline ".ps-google-card { ... }" block plus a dead
           ".modal-card.with-preview" iframe block (kept around from the
           pre-Google-style design) used to live here. */
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #e2e8f0;
        }
        .modal-header h3 {
            margin: 0; font-size: 15px; font-weight: 600;
        }
        .modal-close {
            background: none; border: none;
            font-size: 22px; line-height: 1; cursor: pointer;
            color: #64748b; padding: 0 4px;
        }
        .modal-close:hover { color: #1e293b; }
        .modal-body {
            padding: 14px 18px;
            overflow: auto;
        }
        .modal-body .form-row {
            margin-bottom: 14px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .modal-body .form-row > label.field-label {
            font-size: 12px; color: #475569; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .modal-body select,
        .modal-body input[type=number] {
            padding: 6px 8px; font-size: 13px; font-family: inherit;
            border: 1px solid #cbd5e1; border-radius: 4px;
            background: #fff; color: #1e293b;
        }
        .modal-body select:focus,
        .modal-body input[type=number]:focus {
            outline: none; border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .modal-body .radio-group { display: flex; gap: 16px; }
        .modal-body .radio-group label {
            display: inline-flex; align-items: center; gap: 6px;
            font-weight: normal; cursor: pointer; font-size: 13px;
        }
        .modal-body .margins-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 8px 14px;
        }
        .modal-body .margins-grid label {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: normal;
        }
        .modal-body .margins-grid input { width: 60px; }
        .modal-body .check-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: normal;
        }
        .modal-footer {
            display: flex; justify-content: space-between; gap: 8px;
            padding: 12px 18px;
            border-top: 1px solid #e2e8f0;
        }
        .modal-footer .footer-right { display: flex; gap: 8px; margin-left: auto; }
        .modal-btn {
            padding: 6px 14px; font-size: 13px; border-radius: 4px;
            cursor: pointer; font-family: inherit; line-height: 1.4;
        }
        .modal-btn.primary {
            background: #2563eb; color: #fff; border: 1px solid #1d4ed8;
        }
        .modal-btn.primary:hover { background: #1d4ed8; }
        .modal-btn.secondary {
            background: #fff; color: #475569; border: 1px solid #cbd5e1;
        }
        .modal-btn.secondary:hover { background: #f1f5f9; }
        /* Print button — neutral slate so it doesn't compete with the
           coloured save/refresh icons. */
        .se-file-ops button[data-op="print"] svg { color: #475569; }
        /* Currently-open filename sits next to the saved/unsaved indicator
           in the Univer tab bar (see injectCrosshairTab). Tucked under the
           absolute-positioned indicator wrapper so it tracks the status
           pill on the left edge. Ellipsis-truncated; full name in tooltip. */
        #sheetFileName {
            display: inline-block;
            max-width: 220px;
            padding: 1px 8px;
            font-size: 12px;
            color: #475569;
            background: #f1f5f9;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
        }
        /* Status indicator lives in the Univer tab bar but is pinned to
           the LEFT edge with absolute positioning so it visually sits
           above the "ข้อมูล" refresh button (which is the leftmost item
           in the ribbon row below). The tab bar's tab buttons (เมนู /
           สูตร / โฟกัส) stay center-aligned because the indicator is out
           of flex flow. The parent tab bar is forced to position:
           relative in JS (injectCrosshairTab) so this anchoring works. */
        #sheetDirtyIndicator {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px;
            color: #16a34a;
            font-weight: 500;
            user-select: none;
            line-height: 1.2;
        }
        #sheetDirtyIndicator.dirty { color: #dc2626; }
        #sheetDirtyIndicator::before {
            content: '';
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        #univerHost {
            flex: 1; min-height: 300px;
            position: relative;
            background: #fff;
            border: 1px solid #e2e8f0; border-radius: 8px;
            overflow: hidden;
            color: #1e293b;
        }
        #univerMount { width: 100%; height: 100%; }
        /* Univer portals popovers / menus / dialogs to body via the
           univer-root class. Force a light palette there so the app's
           dark theme doesn't bleed into them. */
        .univer-root,
        .univer-root *,
        .univer-portal,
        .univer-portal * {
            color: #1e293b;
        }
        .univer-portal {
            background: transparent;
        }
        #sheetLoadingOverlay {
            display: none;
            position: absolute; inset: 0;
            background: rgba(241, 245, 249, 0.9);
            z-index: 10;
            flex-direction: column;
            align-items: center; justify-content: center;
            gap: 12px;
        }
        #sheetLoadingOverlay.visible { display: flex; }
        /* While the Univer assets are loading on first entry, the
           empty-state placeholder ("ยังไม่มีข้อมูล — กรุณา Fetch ก่อน...")
           sits behind a 90%-opaque overlay and bleeds through the gap
           between the spinner and the overlay's loading text. Hide the
           empty placeholder for as long as the overlay is shown so the
           two messages don't visually collide. */
        #sheetLoadingOverlay.visible ~ #sheetEmptyMessage { display: none; }
        .sheet-loading-text { color: #475569; font-size: 13px; }
        .sheet-spinner {
            width: 36px; height: 36px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: sheet-spin 0.8s linear infinite;
        }
        @keyframes sheet-spin { to { transform: rotate(360deg); } }
        #sheetEmptyMessage {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            pointer-events: none;
        }
        #sheetEmptyMessage.hidden { display: none; }
        #sheetEmptyMessage > .sheet-empty-text {
            max-width: 520px;
            text-align: center;
            color: #94a3b8; font-size: 14px; line-height: 1.7;
            pointer-events: auto;
        }
        #sheetEmptyMessage .sheet-empty-text b { color: #334155; }
        /* Inline Open button inside the empty-state message so the user can
           load a saved workbook before any data has been fetched (the real
           Open button lives in the Univer ribbon which only renders once a
           workbook is mounted — chicken-and-egg without this). */
        .sheet-empty-open-btn {
            display: inline-block; margin: 12px 4px 0;
            padding: 6px 18px; font-size: 13px; font-family: inherit;
            background: #2563eb; color: #fff;
            border: 1px solid #1d4ed8; border-radius: 4px;
            cursor: pointer; line-height: 1.4;
        }
        .sheet-empty-open-btn:hover { background: #1d4ed8; }
        /* Secondary variant for "New blank workbook" — less prominent
           since loading an existing file is the more common path here. */
        .sheet-empty-open-btn.secondary {
            background: #64748b; border-color: #475569;
        }
        .sheet-empty-open-btn.secondary:hover { background: #475569; }
        /* Theme & Font controls */
        .toolbar-controls {
            display: flex; align-items: center; gap: 6px; margin-left: auto;
        }
        .toolbar-controls button {
            background: none; border: 1px solid #475569; color: #94a3b8;
            border-radius: 6px; width: 32px; height: 32px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.15s;
        }
        .toolbar-controls button:hover { background: #334155; color: #e2e8f0; }
        .toolbar-controls .font-label {
            font-size: 11px; color: #64748b; font-weight: 600; margin: 0 2px;
        }

        /* Light theme */
        body.light { background: #f1f5f9; color: #1e293b; }
        body.light .toolbar { background: #fff; border-bottom-color: #e2e8f0; }
        body.light .toolbar h1 { color: #0f172a; }
        body.light .toolbar-controls button { border-color: #cbd5e1; color: #64748b; }
        body.light .toolbar-controls button:hover { background: #f1f5f9; color: #1e293b; }
        body.light .content { background: #f1f5f9; }

        /* Responsive */
        @media (max-width: 768px) {
            .toolbar { padding: 10px 14px; gap: 8px; }
            .toolbar h1 { font-size: 15px; }
        }

        /* ---- Print styles ------------------------------------------------
           Univer's canvas-based render doesn't survive @media print, so we
           hide the spreadsheet view. Users who want to print should use
           the in-ribbon Print button (Page Setup → jsPDF render). */
        @media print {
            .main > .toolbar,
            #spreadsheetView {
                display: none !important;
            }
            /* Force light palette even if user is on dark theme. The light
               class is what swaps the page to white; we add it unconditionally
               here and reset background/foreground so prints aren't washed
               out or inverted. */
            body, body.light {
                background: #fff !important;
                color: #000 !important;
            }
            .main {
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                display: block !important;
                overflow: visible !important;
            }
            .content {
                padding: 0 !important;
                margin: 0 !important;
                display: block !important;
                overflow: visible !important;
            }
            @page {
                size: A4 landscape;
                margin: 1cm;
            }
        }

        /* ===== Launcher screen (default view on page load) =====
           Three cards: Sheets / Documents / Presentations. Picking a card
           lazy-loads the matching Univer preset, mounts a blank workbook
           or document, and hides the launcher. The Home button in the
           Univer ribbon comes back here on demand. */
        .launcher-screen {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
            padding: 40px 24px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }
        body.light .launcher-screen {
            background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
            color: #1e293b;
        }
        .launcher-title {
            font-size: 28px; font-weight: 700;
            letter-spacing: -0.02em;
            color: inherit;
        }
        .launcher-subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        body.light .launcher-subtitle { color: #64748b; }
        .launcher-cards {
            display: flex; flex-wrap: wrap;
            gap: 48px;
            justify-content: center;
            width: 100%; max-width: 1000px;
        }
        /* Icon-only launcher tiles: no frame, no fill — just the icon +
           label, centered. Hover scales the icon slightly so the click
           target still gets visual feedback. */
        .launcher-card {
            display: flex; flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background: transparent;
            color: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: inherit;
            text-align: center;
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .launcher-card:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(148, 163, 184, 0.08);
        }
        body.light .launcher-card:hover:not(:disabled) {
            background: rgba(15, 23, 42, 0.04);
        }
        .launcher-card:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        .launcher-icon {
            font-size: 72px;
            line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .launcher-icon svg,
        .launcher-icon img {
            width: 80px; height: 80px;
            display: block;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            filter: drop-shadow(0 2px 4px rgba(15, 23, 42, 0.15));
            transition: filter 0.18s ease;
        }
        .launcher-card:hover:not(:disabled) .launcher-icon img {
            filter: drop-shadow(0 4px 8px rgba(15, 23, 42, 0.25));
        }
        .launcher-card-title {
            font-size: 16px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 8px;
            color: inherit;
        }
        .launcher-badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 10.5px; font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #fff;
            background: #f59e0b;
            border-radius: 999px;
            vertical-align: middle;
        }
        @media (max-width: 720px) {
            .launcher-cards { gap: 24px; }
        }

        /* Home button gets a neutral slate icon — mirrors the New button
           tone (also slate) since both are navigation-ish actions, not
           save-family. */
        .se-file-ops button[data-op="home"] svg { color: #475569; }
    </style>
</head>
<body>
    <!-- Main -->
    <div class="main">
        <div class="toolbar">
            <h1 id="appTitle">SE OFFICE</h1>
            <div class="toolbar-controls">
                <button id="fontDown" title="ลดขนาดตัวอักษร">A-</button>
                <span class="font-label" id="fontSizeLabel">13</span>
                <button id="fontUp" title="เพิ่มขนาดตัวอักษร">A+</button>
                <button id="themeToggle" title="สลับธีม">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <!-- Launcher: default first-load view. Picking a card lazy-loads
                 the matching Univer preset, mounts a blank document, hides
                 the launcher and shows #spreadsheetView. The Home button in
                 the Univer ribbon round-trips back here. Presentations is
                 disabled (preset still alpha upstream). -->
            <div id="launcher" class="launcher-screen">
                <div class="launcher-title">SE OFFICE</div>
                <div class="launcher-subtitle">เลือกประเภทเอกสารที่ต้องการสร้าง</div>
                <div class="launcher-cards">
                    <button type="button" class="launcher-card" data-mode="sheets">
                        <div class="launcher-icon">
                            <img src="Sheets.png" alt="SE Sheets" draggable="false">
                        </div>
                        <div class="launcher-card-title">SE Sheets</div>
                    </button>
                    <button type="button" class="launcher-card" data-mode="docs" disabled
                            title="ยังไม่เปิดใช้งาน">
                        <div class="launcher-icon">
                            <img src="Doc.png" alt="SE Doc" draggable="false">
                        </div>
                        <div class="launcher-card-title">SE Doc <span class="launcher-badge">Coming Soon</span></div>
                    </button>
                </div>
            </div>
            <div id="spreadsheetView">
                <div id="univerHost">
                    <div id="sheetLoadingOverlay">
                        <div class="sheet-spinner"></div>
                        <div class="sheet-loading-text">กำลังโหลด Univer...</div>
                    </div>
                    <div id="sheetEmptyMessage"><div class="sheet-empty-text">กดปุ่ม <b>ไฟล์ใหม่</b> เพื่อเริ่ม workbook ว่าง<br>หรือกดปุ่ม <b>Open</b> เพื่อโหลด workbook ที่บันทึกไว้</div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Page Setup modal — DOM is created on demand by
         SeShared.print.pageSetup.init() (shared module ships its own
         Thai-labelled markup + CSS). Wired up in _ensurePageSetup
         below. -->


    <script>
        // ========== THEME TOGGLE ==========
        const MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>';
        const SUN_SVG = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        const themeIcon = document.getElementById('themeIcon');

        function applyTheme(theme) {
            document.body.classList.toggle('light', theme === 'light');
            themeIcon.innerHTML = theme === 'light' ? MOON_SVG : SUN_SVG;
            localStorage.setItem('se_theme', theme);
        }
        applyTheme(localStorage.getItem('se_theme') || 'light');

        document.getElementById('themeToggle').addEventListener('click', () => {
            applyTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        });

        // ========== FONT SIZE ==========
        // Affects only the toolbar chrome on this standalone build —
        // the Univer canvas manages its own cell font sizes.
        const fontSizeLabel = document.getElementById('fontSizeLabel');
        let fontSize = parseInt(localStorage.getItem('se_font_size') || '13');

        function applyFontSize(size) {
            fontSize = Math.max(10, Math.min(20, size));
            document.documentElement.style.setProperty('--base-font', fontSize + 'px');
            fontSizeLabel.textContent = fontSize;
            localStorage.setItem('se_font_size', fontSize);
        }
        applyFontSize(fontSize);

        document.getElementById('fontUp').addEventListener('click', () => applyFontSize(fontSize + 1));
        document.getElementById('fontDown').addEventListener('click', () => applyFontSize(fontSize - 1));

        // ========== SPREADSHEET VIEW (Univer) ==========
        // Univer (https://univer.ai) ships UMD bundles via unpkg, so we
        // lazy-load all required scripts on first tab entry. All
        // persistence is client-side: Save → JSON Blob download,
        // Open → file picker + FileReader. No backend involvement.
        const UNIVER_BASE = 'https://unpkg.com';
        // Base deps shared by every mode (Sheets, Docs, future Slides).
        // Loaded once at first enterMode + cached forever.
        const UNIVER_URLS_BASE = {
            react:        `${UNIVER_BASE}/react@18.3.1/umd/react.production.min.js`,
            reactDom:     `${UNIVER_BASE}/react-dom@18.3.1/umd/react-dom.production.min.js`,
            rxjs:         `${UNIVER_BASE}/rxjs/dist/bundles/rxjs.umd.min.js`,
            presets:      `${UNIVER_BASE}/@univerjs/presets/lib/umd/index.js`,
        };
        // Sheets-only assets: core preset + all the feature presets
        // (filter / sort / find-replace / cf / data-validation / drawing /
        // hyper-link / note / table) + the crosshair-highlight plugin.
        const UNIVER_URLS_SHEETS = {
            core:         `${UNIVER_BASE}/@univerjs/preset-sheets-core/lib/umd/index.js`,
            coreLocale:   `${UNIVER_BASE}/@univerjs/preset-sheets-core/lib/umd/locales/en-US.js`,
            filter:       `${UNIVER_BASE}/@univerjs/preset-sheets-filter/lib/umd/index.js`,
            filterLocale: `${UNIVER_BASE}/@univerjs/preset-sheets-filter/lib/umd/locales/en-US.js`,
            sort:         `${UNIVER_BASE}/@univerjs/preset-sheets-sort/lib/umd/index.js`,
            sortLocale:   `${UNIVER_BASE}/@univerjs/preset-sheets-sort/lib/umd/locales/en-US.js`,
            findReplace:  `${UNIVER_BASE}/@univerjs/preset-sheets-find-replace/lib/umd/index.js`,
            findReplaceLocale: `${UNIVER_BASE}/@univerjs/preset-sheets-find-replace/lib/umd/locales/en-US.js`,
            cf:           `${UNIVER_BASE}/@univerjs/preset-sheets-conditional-formatting/lib/umd/index.js`,
            cfLocale:     `${UNIVER_BASE}/@univerjs/preset-sheets-conditional-formatting/lib/umd/locales/en-US.js`,
            dataValidation:       `${UNIVER_BASE}/@univerjs/preset-sheets-data-validation/lib/umd/index.js`,
            dataValidationLocale: `${UNIVER_BASE}/@univerjs/preset-sheets-data-validation/lib/umd/locales/en-US.js`,
            drawing:              `${UNIVER_BASE}/@univerjs/preset-sheets-drawing/lib/umd/index.js`,
            drawingLocale:        `${UNIVER_BASE}/@univerjs/preset-sheets-drawing/lib/umd/locales/en-US.js`,
            hyperLink:            `${UNIVER_BASE}/@univerjs/preset-sheets-hyper-link/lib/umd/index.js`,
            hyperLinkLocale:      `${UNIVER_BASE}/@univerjs/preset-sheets-hyper-link/lib/umd/locales/en-US.js`,
            note:                 `${UNIVER_BASE}/@univerjs/preset-sheets-note/lib/umd/index.js`,
            noteLocale:           `${UNIVER_BASE}/@univerjs/preset-sheets-note/lib/umd/locales/en-US.js`,
            table:                `${UNIVER_BASE}/@univerjs/preset-sheets-table/lib/umd/index.js`,
            tableLocale:          `${UNIVER_BASE}/@univerjs/preset-sheets-table/lib/umd/locales/en-US.js`,
            // Lower-level plugin (no preset bundle, no locale file) — adds
            // Google-Sheets-style row+column highlight for the active cell.
            // Registered manually via univer.registerPlugin() in mountUniver.
            crosshair:            `${UNIVER_BASE}/@univerjs/sheets-crosshair-highlight/lib/umd/index.js`,
            // CSS for each preset (loaded in parallel as <link>)
            cssCore:      `${UNIVER_BASE}/@univerjs/preset-sheets-core/lib/index.css`,
            cssFilter:    `${UNIVER_BASE}/@univerjs/preset-sheets-filter/lib/index.css`,
            cssSort:      `${UNIVER_BASE}/@univerjs/preset-sheets-sort/lib/index.css`,
            cssFindReplace: `${UNIVER_BASE}/@univerjs/preset-sheets-find-replace/lib/index.css`,
            cssCf:        `${UNIVER_BASE}/@univerjs/preset-sheets-conditional-formatting/lib/index.css`,
            cssDataValidation: `${UNIVER_BASE}/@univerjs/preset-sheets-data-validation/lib/index.css`,
            cssDrawing:        `${UNIVER_BASE}/@univerjs/preset-sheets-drawing/lib/index.css`,
            cssHyperLink:      `${UNIVER_BASE}/@univerjs/preset-sheets-hyper-link/lib/index.css`,
            cssNote:           `${UNIVER_BASE}/@univerjs/preset-sheets-note/lib/index.css`,
            cssTable:          `${UNIVER_BASE}/@univerjs/preset-sheets-table/lib/index.css`,
            cssCrosshair:      `${UNIVER_BASE}/@univerjs/sheets-crosshair-highlight/lib/index.css`,
        };
        // Docs-only assets: just preset-docs-core (no feature presets yet,
        // upstream Univer's docs feature ecosystem is still thinner than
        // sheets'). Loaded lazily on first Documents-mode entry.
        const UNIVER_URLS_DOCS = {
            core:       `${UNIVER_BASE}/@univerjs/preset-docs-core/lib/umd/index.js`,
            coreLocale: `${UNIVER_BASE}/@univerjs/preset-docs-core/lib/umd/locales/en-US.js`,
            cssCore:    `${UNIVER_BASE}/@univerjs/preset-docs-core/lib/index.css`,
        };
        // Back-compat alias — existing code (Page Setup, XLSX import, etc.)
        // still references UNIVER_URLS.X for the sheets-flavored URLs.
        // Keeping the name avoids touching every reference site.
        const UNIVER_URLS = UNIVER_URLS_SHEETS;
        // Column keys that should be forced to text type in XLSX export.
        // Empty in the standalone build — original iSurvey-specific keys
        // were dropped along with the form/fetch pipeline.
        const SHEET_TEXT_KEYS = new Set();
        const SHEET_PERF_THRESHOLD = 50000;

        const sheetState = {
            // 'sheets' | 'docs' | null. null = launcher visible, no Univer
            // mounted. Set by enterMode + cleared by goHome. File-ops,
            // open/save/print all branch on this.
            mode: null,
            loaded: false,           // legacy combined flag (true once any preset stack is loaded)
            loadingPromise: null,    // in-flight load promise (single-flight, legacy combined)
            // Per-mode CDN-load state — keeps Sheets and Docs presets cached
            // separately so flipping Sheets → Home → Docs only fetches docs
            // preset on the FIRST Docs entry.
            loadedSheets: false,
            loadingSheetsPromise: null,
            loadedDocs: false,
            loadingDocsPromise: null,
            mounted: false,          // Univer workbook/document created
            dirty: false,            // edits since last save
            currentData: null,       // last known workbook snapshot (IWorkbookData) or IDocumentData
            univer: null,            // root Univer instance
            univerAPI: null,         // Facade API
            sourceLabel: '',
            recordCount: 0,
            colCount: 0,
            crosshairOn: false,      // Crosshair highlight toggle state (sheets only)
            // File System Access API state. fileHandle stays set across
            // edits so Save can overwrite the source file 1-click; fileKind
            // ('json' | 'xlsx') guards against writing a .xlsx blob into a
            // .se.json handle (and vice versa). null on browsers without
            // the API or when the workbook was built from a fetch.
            fileHandle: null,
            fileName: null,
            fileKind: null,
            // Concurrency guard for save flows. Set while a Save/Save As is
            // mid-flight so a second click during the (potentially
            // multi-second) xlsx build doesn't fire a parallel write that
            // races the first and lands a stale snapshot on disk.
            saving: false,
        };

        // Crosshair highlight is implemented by the @univerjs/sheets-
        // crosshair-highlight plugin. It exposes a single toggle command
        // that flips the highlight on/off; we mirror its state into a
        // boolean and an .active class on the injected tab so the user
        // knows what they're looking at without staring at the cell for
        // half a second to see if the row glow appeared.
        function setCrosshairButtonState() {
            const injected = document.querySelector('.univer-crosshair-tab');
            if (!injected) return;
            injected.classList.toggle('active', sheetState.crosshairOn);
            injected.textContent = 'โฟกัส';
        }

        async function toggleCrosshair() {
            if (!sheetState.mounted || !sheetState.univerAPI) return;
            try {
                await sheetState.univerAPI.executeCommand('sheet.operation.toggle-crosshair-highlight');
                sheetState.crosshairOn = !sheetState.crosshairOn;
                setCrosshairButtonState();
            } catch (e) {
                console.error('toggle crosshair failed:', e);
            }
        }

        // Sort the entire data region (rows 1..recordCount × cols 0..colCount-1)
        // using the leftmost column of the user's current selection as the
        // sort key. Univer's built-in sort-range-asc / -ext sorts only the
        // selected range — and because our cellData is sparse (empty cells
        // omitted, see workbook builder), the "-ext" auto-expansion fails to
        // detect a contiguous data region and falls back to sorting just the
        // one column, which leaves the other columns unmoved and breaks row
        // integrity. Forcing a full-data sort here keeps rows coherent.
        async function _runFullSheetSort(ascending) {
            if (!sheetState.univerAPI) return;
            const wb = sheetState.univerAPI.getActiveWorkbook();
            if (!wb) return;
            const sheet = wb.getActiveSheet();
            if (!sheet) return;
            const sel = sheet.getActiveRange();
            let sortKey = 0;
            if (sel) {
                if (typeof sel.getColumn === 'function') sortKey = sel.getColumn() || 0;
                else if (typeof sel.getRange === 'function') {
                    const r = sel.getRange();
                    if (r && typeof r.startColumn === 'number') sortKey = r.startColumn;
                }
            }
            const dataRows = sheetState.recordCount || 0;
            const dataCols = sheetState.colCount || 0;
            if (dataRows < 1 || dataCols < 1) return;
            const range = sheet.getRange(1, 0, dataRows, dataCols);
            if (!range || typeof range.sort !== 'function') return;
            range.sort([{ column: sortKey, ascending: !!ascending }]);
        }

        // Inject a Crosshair toggle button into Univer's tab bar as a
        // sibling of Start/Insert/Formulas/Data. Univer renders the tab
        // bar as a flex container with 4 role="tab" buttons; we attach
        // our button at the end (next to Data). Idempotent — the
        // MutationObserver re-injects if Univer wipes the tab bar (e.g.
        // on workbook re-mount).
        let _crosshairTabObserver = null;
        function injectCrosshairTab() {
            const mount = document.getElementById('univerMount');
            if (!mount) return;
            const anyTab = mount.querySelector('[role="tab"]');
            if (!anyTab) return;
            const tabBar = anyTab.parentElement;
            if (!tabBar) return;
            // Hide Data + Insert tabs — their tools are duplicated into the
            // Start ribbon by patchStartRibbonWith{Data,Insert}Tools, so the
            // separate tabs are redundant. Also relabel Start → "เมนู" and
            // Formulas → "สูตร" so all visible tab labels are in Thai (the
            // crosshair button below uses Thai-friendly "Highlight"). Re-run
            // on every inject (initial + observer re-fires) in case Univer
            // re-renders the tab bar.
            const relabelTab = (tab, newLabel) => {
                // Walk text nodes so we don't blow away Univer's nested
                // span/icon wrappers; just rewrite the visible text.
                const walker = document.createTreeWalker(tab, NodeFilter.SHOW_TEXT);
                while (walker.nextNode()) {
                    const node = walker.currentNode;
                    if (node.nodeValue && node.nodeValue.trim()) {
                        node.nodeValue = newLabel;
                        return;
                    }
                }
            };
            for (const tab of tabBar.children) {
                if (!tab.getAttribute || tab.getAttribute('role') !== 'tab') continue;
                const label = tab.textContent.trim();
                if (label === 'Data' || label === 'Insert') {
                    tab.style.display = 'none';
                } else if (label === 'Start') {
                    relabelTab(tab, 'เมนู');
                } else if (label === 'Formulas') {
                    relabelTab(tab, 'สูตร');
                }
            }
            // Status indicator (saved / ● unsaved) is pinned to the LEFT
            // edge of the tab bar via absolute positioning so it visually
            // lines up above the "ข้อมูล" refresh button in the ribbon
            // row below — not centered with the tab buttons. We force the
            // tab bar to position: relative so the absolute anchor works
            // (Univer's default is static).
            if (getComputedStyle(tabBar).position === 'static') {
                tabBar.style.position = 'relative';
            }
            if (!tabBar.querySelector('#sheetDirtyIndicator')) {
                // Wrap the indicator + filename in a single absolutely-
                // positioned container so they move together as one unit
                // pinned to the left edge of the tab bar.
                const wrap = document.createElement('span');
                wrap.id = 'sheetDirtyIndicator';
                wrap.innerHTML =
                    '<span class="status-label">saved</span>' +
                    '<span id="sheetFileName" style="display:none"></span>';
                wrap.classList.toggle('dirty', !!sheetState.dirty);
                const labelEl = wrap.querySelector('.status-label');
                if (labelEl) labelEl.textContent = sheetState.dirty ? 'unsaved' : 'saved';
                wrap.title = sheetState.dirty
                    ? 'มีการแก้ไขที่ยังไม่ได้บันทึก'
                    : 'บันทึกแล้ว';
                tabBar.appendChild(wrap);
                // Re-apply the current file label after the wrap is in DOM
                // so setSheetFile finds #sheetFileName and updates it.
                setSheetFile(sheetState.fileHandle, sheetState.fileName, sheetState.fileKind);
            }
            if (tabBar.querySelector('.univer-crosshair-tab')) {
                setCrosshairButtonState();
                return;
            }
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'univer-crosshair-tab';
            btn.textContent = 'โฟกัส';
            btn.title = 'เปิด/ปิดโฟกัส (Crosshair Highlight)';
            btn.addEventListener('click', toggleCrosshair);
            tabBar.appendChild(btn);
            setCrosshairButtonState();
            if (_crosshairTabObserver) {
                try { _crosshairTabObserver.disconnect(); } catch {}
            }
            // Watch for two things:
            //  1) Univer re-rendering the tab bar (wipes our crosshair button)
            //     → re-inject the button
            //  2) Univer overwriting the Thai labels back to "Start" / "Formulas"
            //     when a different tab becomes active (React re-renders the
            //     text node) → re-apply Thai labels in place. characterData
            //     + subtree catches text-node mutations without us needing
            //     to re-create the whole button.
            _crosshairTabObserver = new MutationObserver(() => {
                if (!tabBar.querySelector('.univer-crosshair-tab')
                    || !tabBar.querySelector('#sheetDirtyIndicator')) {
                    setTimeout(injectCrosshairTab, 50);
                    return;
                }
                for (const tab of tabBar.children) {
                    if (!tab.getAttribute || tab.getAttribute('role') !== 'tab') continue;
                    const t = tab.textContent.trim();
                    if (t === 'Start') relabelTab(tab, 'เมนู');
                    else if (t === 'Formulas') relabelTab(tab, 'สูตร');
                    else if ((t === 'Data' || t === 'Insert') && tab.style.display !== 'none') {
                        tab.style.display = 'none';
                    }
                }
            });
            _crosshairTabObserver.observe(tabBar, {
                childList: true,
                subtree: true,
                characterData: true,
            });
        }

        // Inject app-specific file-ops (Refresh Data / Open / Save / Save
        // XLSX + dirty indicator) at the head of Univer's ribbon row, just
        // before the Undo button. Univer's ribbon doesn't have a File menu
        // and these are .se.json-specific operations that don't belong as
        // Univer commands, so we hand-inject them.
        // Idempotent + observed — re-injects if Univer wipes the row on
        // tab switch / workbook re-mount.
        let _fileOpsObserver = null;
        function injectFileOpsIntoUniverRibbon() {
            const mount = document.getElementById('univerMount');
            if (!mount) return;
            const tabHeader = Array.from(mount.querySelectorAll('header'))
                .find(h => h.querySelector('[role="tab"]'));
            if (!tabHeader) return;
            // header has 3 children: tab bar (0), ribbon row (1), invisible (2)
            const ribbonRow = tabHeader.children[1];
            if (!ribbonRow) return;
            // Insert as the first grid-child of the ribbon row + tag the
            // row so our CSS override (grid-template-columns: max-content
            // 1fr) kicks in. Putting the wrap inside the inner flex
            // container doesn't work — the inner is sized wider than its
            // grid cell and centered, pushing our buttons off-screen left.
            if (ribbonRow.querySelector(':scope > .se-file-ops')) return;
            ribbonRow.classList.add('se-ribbon-has-fileops');
            const wrap = document.createElement('div');
            wrap.className = 'se-file-ops';
            // Icon-driven buttons. Each SVG inherits color from CSS so we can
            // tint per-button (blue save disk / etc.). SVGs use currentColor
            // + fill="none" stroke shape so the .se-file-ops button[data-op=X]
            // svg { color: ... } rules in CSS drive their tint.
            const ICON_OPEN =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
                '<path d="M3 11h18"/>' +
                '</svg>';
            const ICON_SAVE =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M5 3h11l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/>' +
                '<rect x="7" y="13" width="10" height="7"/>' +
                '<path d="M8 3v5h7V3"/>' +
                '</svg>';
            // New: blank document outline with a "+" inside. Same outer
            // silhouette as ICON_OPEN/ICON_SAVE_AS so the file-ops family
            // stays visually consistent.
            const ICON_NEW =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>' +
                '<polyline points="14 2 14 8 20 8"/>' +
                '<line x1="9" y1="15" x2="15" y2="15"/>' +
                '<line x1="12" y1="12" x2="12" y2="18"/>' +
                '</svg>';
            // Save As: a smaller floppy disk in the lower-left with an
            // outward-pointing arrow ↗ in the top-right corner — the
            // standard "share / export / save elsewhere" idiom. Reads as
            // "save, then redirect somewhere new" at a glance.
            const ICON_SAVE_AS =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M3 6a2 2 0 0 1 2-2h8l3 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z"/>' +
                '<rect x="6" y="14" width="8" height="5"/>' +
                '<path d="M7 4v4h5V4"/>' +
                '<line x1="15" y1="9" x2="21" y2="3"/>' +
                '<polyline points="21 9 21 3 15 3"/>' +
                '</svg>';
            // Page Setup: gear/cog — universal "settings" affordance.
            // Print: classic printer silhouette — top sheet, body, output
            // tray. Strokes use currentColor so CSS tints it slate-grey to
            // sit visually quieter than the coloured save icons.
            const ICON_PRINT =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<polyline points="6 9 6 2 18 2 18 9"/>' +
                '<path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>' +
                '<rect x="6" y="14" width="12" height="8"/>' +
                '</svg>';
            // Home: classic house silhouette. Leads back to the launcher
            // (with a dirty-confirm guard). Sits first in the file-ops row
            // since it's a "leave editor" action — visually upstream of
            // New / Open / Save.
            const ICON_HOME =
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                '<path d="M3 11l9-8 9 8"/>' +
                '<path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/>' +
                '</svg>';
            const isDocsMode = sheetState.mode === 'docs';
            // Docs mode skips Print + Save XLSX (sheets-only features).
            // Home comes first so the "leave editor" affordance always sits
            // in a known position.
            let html =
                '<button type="button" data-op="home" title="กลับหน้าหลัก">' + ICON_HOME + '</button>' +
                '<button type="button" data-op="new" title="' +
                    (isDocsMode ? 'สร้างเอกสารว่าง' : 'สร้าง workbook ว่าง') + '">' + ICON_NEW + '</button>' +
                '<button type="button" data-op="open" title="' +
                    (isDocsMode
                        ? 'เปิดไฟล์ .univer.json'
                        : 'เปิดไฟล์ .se / .se.json หรือ Excel') + '">' + ICON_OPEN + '</button>' +
                '<button type="button" data-op="save" title="บันทึกทับไฟล์ที่เปิดอยู่">' + ICON_SAVE + '</button>' +
                '<button type="button" data-op="saveas" title="บันทึกเป็น... (เลือก path / format)">' + ICON_SAVE_AS + '</button>';
            if (!isDocsMode) {
                html +=
                    '<button type="button" data-op="print" title="พิมพ์ — ดู preview ก่อนกดถัดไป (Ctrl+P)">' + ICON_PRINT + '</button>';
            }
            wrap.innerHTML = html;
            // Note: #sheetFileName lives next to #sheetDirtyIndicator in
            // the tab bar (injected by injectCrosshairTab) — not in this
            // ribbon row — so it visually pairs with the saved/unsaved
            // status. Buttons here still need their Open/Save/SaveXLSX
            // tooltips re-synced after this fresh inject, so setSheetFile
            // gets called at the end (no-op for #sheetFileName here).
            wrap.querySelector('[data-op="home"]').addEventListener('click', goHome);
            wrap.querySelector('[data-op="new"]').addEventListener('click', newBlank);
            wrap.querySelector('[data-op="open"]').addEventListener('click', openSheetFile);
            wrap.querySelector('[data-op="save"]').addEventListener('click', saveSheetFile);
            wrap.querySelector('[data-op="saveas"]').addEventListener('click', saveSheetAs);
            if (!isDocsMode) {
                wrap.querySelector('[data-op="print"]').addEventListener('click', printActiveView);
            }
            // Insert as the first grid column of the ribbon row.
            ribbonRow.insertBefore(wrap, ribbonRow.firstChild);
            // Re-sync the filename label + tooltips after this fresh inject
            // — Univer may have wiped the previous wrap on tab switch.
            setSheetFile(sheetState.fileHandle, sheetState.fileName, sheetState.fileKind);
            if (_fileOpsObserver) {
                try { _fileOpsObserver.disconnect(); } catch {}
            }
            _fileOpsObserver = new MutationObserver(() => {
                if (!ribbonRow.querySelector(':scope > .se-file-ops')) {
                    setTimeout(injectFileOpsIntoUniverRibbon, 50);
                }
            });
            _fileOpsObserver.observe(ribbonRow, { childList: true });
        }

        // The menu-manager-service identifier is a Symbol so a plain
        // inj.get('univer.menu-manager-service') throws — walk
        // resolvedDependencies and match by Symbol description instead.
        function findUniverMenuManager(injector, depth = 0) {
            if (!injector || depth > 5) return null;
            const dm = injector.resolvedDependencyCollection?.resolvedDependencies
                || injector.resolvedDependencyCollection;
            if (dm) {
                const items = dm instanceof Map
                    ? Array.from(dm.entries())
                    : Object.entries(dm);
                for (const [k, v] of items) {
                    if (String(k) === 'univer.menu-manager-service'
                        && Array.isArray(v) && v[0]?._menu) {
                        return v[0];
                    }
                }
            }
            for (const c of injector.children || []) {
                const found = findUniverMenuManager(c, depth + 1);
                if (found) return found;
            }
            return null;
        }

        // Move the Data tab's ribbon items (filter / sort / find / table-
        // selector / data-validation / conditional-formatting / text-to-
        // number) into the Start tab's ribbon row so users don't have to
        // switch tabs to reach them. Run once between createUniver and
        // createWorkbook — `IMenuManagerService.mergeMenu()` updates the
        // schema and emits menuChanged$ so the ribbon picks up the new
        // items on its first render.
        //
        // Note: items are NOT moved out of the Data tab — they're
        // *referenced* in both places (same menuItemFactory object). The
        // Data tab still shows them; the Start ribbon shows them too.
        function patchStartRibbonWithDataTools(univerInstance) {
            try {
                const inj = univerInstance?._injector;
                if (!inj) return;
                const mgr = findUniverMenuManager(inj);
                if (!mgr) return;
                const dataRibbon = mgr._menu?.ribbon?.['ribbon.data'];
                if (!dataRibbon) return;
                // Collect every leaf menu item from the Data tab's subgroups
                // (rules / organization / others). Each subgroup is a node
                // whose own children are the menu items keyed by their id.
                const collected = {};
                for (const groupKey of Object.keys(dataRibbon)) {
                    if (groupKey === 'order') continue;
                    const group = dataRibbon[groupKey];
                    for (const itemKey of Object.keys(group)) {
                        if (itemKey === 'order' || itemKey === 'menuItemFactory') continue;
                        collected[itemKey] = group[itemKey];
                    }
                }
                mgr.mergeMenu({ 'ribbon.start.others': collected });
            } catch (e) {
                console.warn('patchStartRibbonWithDataTools failed:', e);
            }
        }

        // Move Insert tab's image + hyperlink into the Start ribbon's
        // "history" group so they sit right after the undo / redo / format-
        // painter / clear cluster, before the font dropdown — a stable
        // visible position that doesn't compete for space with the densely-
        // packed format / layout / others groups (where high-order items
        // overflow into Univer's "More" menu and disappear).
        //
        // Skips the zen-editor hyperlink variant (only used in zen mode) and
        // doc.menu.table (Docs-specific, not a sheet feature). Shallow-copy
        // each item with an overridden `order` so the two icons land
        // adjacent at the end of the history group without mutating the
        // shared object that Univer's Insert tab still uses.
        function patchStartRibbonWithInsertTools(univerInstance) {
            try {
                const inj = univerInstance?._injector;
                if (!inj) return;
                const mgr = findUniverMenuManager(inj);
                if (!mgr) return;
                const insertRibbon = mgr._menu?.ribbon?.['ribbon.insert'];
                if (!insertRibbon) return;
                // Order matters in the output: image first, hyperlink second
                const wantedOrder = [
                    'sheet.menu.image',
                    'sheet.operation.insert-hyper-link-toolbar',
                ];
                const originalItems = {};
                for (const groupKey of Object.keys(insertRibbon)) {
                    if (groupKey === 'order') continue;
                    const group = insertRibbon[groupKey];
                    for (const itemKey of Object.keys(group)) {
                        if (itemKey === 'order' || itemKey === 'menuItemFactory') continue;
                        originalItems[itemKey] = group[itemKey];
                    }
                }
                const collected = {};
                wantedOrder.forEach((id, idx) => {
                    const src = originalItems[id];
                    if (!src) return;
                    collected[id] = Object.assign({}, src, { order: 100 + idx });
                });
                if (Object.keys(collected).length === 0) return;
                mgr.mergeMenu({ 'ribbon.start.history': collected });
            } catch (e) {
                console.warn('patchStartRibbonWithInsertTools failed:', e);
            }
        }

        function setSheetDirty(flag) {
            sheetState.dirty = flag;
            const ind = document.getElementById('sheetDirtyIndicator');
            if (!ind) return;
            ind.classList.toggle('dirty', !!flag);
            const labelEl = ind.querySelector('.status-label');
            if (labelEl) labelEl.textContent = flag ? 'unsaved' : 'saved';
            ind.title = flag ? 'มีการแก้ไขที่ยังไม่ได้บันทึก' : 'บันทึกแล้ว';
        }

        // ===== Page Setup =====
        // Owned by SeShared.print.pageSetup. The shared module renders its
        // own Thai-labelled modal HTML + CSS + state mgmt + PDF.js-driven
        // live preview pane. The localStorage key matches the legacy
        // inline value so existing user preferences carry over.
        const PAGE_SETUP_KEY = 'se_page_setup_v1';
        // Defaults match Excel's "Normal" margins preset (Top/Bottom
        // 0.75″ ≈ 19 mm, Left/Right 0.7″ ≈ 18 mm) on A4 portrait — what
        // a fresh user expects after clicking Reset. Still kept here as
        // a fallback for printSheetToPdf when called without a state
        // override (the shared module would normally be the source).
        const PAGE_SETUP_DEFAULTS = {
            paperSize: 'a4', orientation: 'portrait',
            marginTop: 19, marginBottom: 19, marginLeft: 18, marginRight: 18,
            header: false, footer: false,
            scaling: 'full', fitWide: 1, fitTall: 0, scalePercent: 100,
            repeatRowStart: 0, repeatRowEnd: 0,
            repeatColStart: 0, repeatColEnd: 0,
            printArea: '', blackAndWhite: false,
        };
        function loadPageSetup() {
            try {
                const raw = localStorage.getItem(PAGE_SETUP_KEY);
                if (!raw) return { ...PAGE_SETUP_DEFAULTS };
                const parsed = JSON.parse(raw);
                return { ...PAGE_SETUP_DEFAULTS, ...parsed };
            } catch (e) {
                return { ...PAGE_SETUP_DEFAULTS };
            }
        }

        // Lazy singleton — built on first open. The shared init() also
        // sets up Ctrl+P/Cmd+P routing inside its own modal so we don't
        // re-bind keyboard shortcuts here.
        let _pageSetupInstance = null;
        async function _ensurePageSetup() {
            if (_pageSetupInstance) return _pageSetupInstance;
            await loadPageSetupAssets();
            _pageSetupInstance = SeShared.print.pageSetup.init({
                storageKey: PAGE_SETUP_KEY,
                // User clicked "ถัดไป" — fire the existing print
                // pipeline with the confirmed state. Defer so the
                // modal-close paint lands before the slow PDF render.
                onSave: (state) => {
                    setTimeout(() => printSheetToPdf(state), 50);
                },
                preview: {
                    // Module debounces + caches; we just return a Blob.
                    // Guard on mount: a stale instance after the user
                    // closed the workbook would otherwise throw inside
                    // printSheetToPdf's snapshot-grab.
                    generatePdf: async (state) => {
                        if (!sheetState.mounted) return null;
                        return await printSheetToPdf(state, true);
                    },
                },
            });
            return _pageSetupInstance;
        }

        async function openPageSetupModal() {
            const ps = await _ensurePageSetup();
            ps.open();
        }

        function closePageSetupModal() {
            if (_pageSetupInstance) _pageSetupInstance.close();
        }

        // Hex "#RRGGBB" / "RRGGBB" → [r, g, b] tuple that jsPDF /
        // autoTable's colour-array convention accepts. Returns null when
        // the input isn't a valid 6-char hex.
        function _hexToRgbArray(hex) {
            if (!hex) return null;
            const s = String(hex).replace(/^#/, '');
            if (!/^[0-9a-fA-F]{6}$/.test(s)) return null;
            return [
                parseInt(s.substr(0, 2), 16),
                parseInt(s.substr(2, 2), 16),
                parseInt(s.substr(4, 2), 16),
            ];
        }

        // Paper sizes in mm — keyed by the same id jsPDF accepts in the
        // `format` constructor option. Used to compute printable width
        // for the column-chunk splitter below.
        const PAPER_SIZES_MM = {
            a3:     { w: 297, h: 420 },
            a4:     { w: 210, h: 297 },
            a5:     { w: 148, h: 210 },
            letter: { w: 216, h: 279 },
            legal:  { w: 216, h: 356 },
        };

        function _paperWidthMm(paperSize, orientation) {
            const s = PAPER_SIZES_MM[paperSize] || PAPER_SIZES_MM.a4;
            return orientation === 'landscape' ? s.h : s.w;
        }

        // Univer stores column widths in CSS pixels (96 dpi). Convert to
        // mm using the same dpi assumption jsPDF uses internally — that
        // way 1 mm in autoTable lines up with 1 mm of source column.
        function _pxToMm(px) { return px * 25.4 / 96; }

        function _getUniverColumnWidthsMm(sheet, maxC) {
            const defaultPx = sheet.defaultColumnWidth || 88;
            const columnData = sheet.columnData || {};
            const out = [];
            for (let c = 0; c <= maxC; c++) {
                const px = (columnData[c] && columnData[c].w) || defaultPx;
                out.push(_pxToMm(px));
            }
            return out;
        }

        // Parse an A1-style range "A1:G100" → 0-based half-open bounds.
        // Returns null on bad / empty input so callers can fall back to
        // the full populated range.
        function _parsePrintArea(text) {
            if (!text) return null;
            const m = String(text).trim().toUpperCase()
                .match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/);
            if (!m) return null;
            const cStart = _letterToColIdx(m[1]);
            const cEnd = _letterToColIdx(m[3]);
            const rStart = parseInt(m[2], 10) - 1;
            const rEnd = parseInt(m[4], 10) - 1;
            if (cStart < 0 || cEnd < 0 || rStart < 0 || rEnd < 0) return null;
            return {
                minR: Math.min(rStart, rEnd),
                maxR: Math.max(rStart, rEnd),
                minC: Math.min(cStart, cEnd),
                maxC: Math.max(cStart, cEnd),
            };
        }

        // Chunk the column indices into groups that each fit within
        // `printableWidthMm`. Walks left→right, accumulating widths, and
        // cuts a new chunk every time the next column would overflow.
        // Single overflow-wider-than-page columns get their own chunk
        // (autoTable will then size them down to fit the page).
        // Column-pagination math lives in SeShared.print.pdfGenerator. The
        // single caller (bodyChunks in printSheetToPdf) already awaits
        // loadJsPdfAssets which loads the shared module, so the global
        // is guaranteed by then — no extra await needed here.

        // Render the current Univer snapshot as a PDF via jsPDF +
        // autoTable and open it in a new tab so the user can review +
        // print from the browser's built-in PDF viewer. The Univer
        // canvas itself doesn't survive @media print (which is why
        // window.print() was hidden behind an alert before), so we
        // rebuild the workbook as a tabular PDF instead. Cell-level
        // Univer styles (bg, text colour, bold, alignment, borders)
        // are propagated to autoTable via didParseCell so the print
        // looks like what the user would get opening the same file in
        // Excel and pressing Print. Wide tables get split horizontally
        // into multiple pages the same way Excel does by default — col
        // groups go on separate pages instead of being scaled down to
        // unreadable widths.
        // psOverride: when set (typically the live form state for the
        // Page Setup preview), use this instead of the persisted setup.
        // returnBlobOnly: when true, return the rendered PDF blob and
        // skip the overlay / window.open / download flow. Used by the
        // preview iframe inside the Page Setup modal.
        async function printSheetToPdf(psOverride, returnBlobOnly) {
            const snapshot = getCurrentUniverSnapshot();
            if (!snapshot || !snapshot.sheets) {
                if (returnBlobOnly) return null;
                alert('ยังไม่มี workbook ให้พิมพ์');
                return;
            }
            try {
                if (!returnBlobOnly) {
                    setSheetOverlay(true, 'กำลังโหลด jsPDF + ฟอนต์ไทย (~370 KB)...');
                }
                await loadJsPdfAssets();
                if (!returnBlobOnly) await loadPrintPreviewAssets();
                // Flush pending cell editor so a mid-type Print captures
                // the value the user is currently typing instead of the
                // pre-edit state — same root cause as the Save fix.
                await commitActiveCellEdit();
                if (!returnBlobOnly) {
                    setSheetOverlay(true, 'กำลังสร้าง PDF...');
                }

                // Honour the user's active tab in Univer — ask the
                // facade which sheet is current, and only fall back to
                // sheet[0] if the API isn't available. Without this,
                // switching to "Sheet2" then Print would still PDF
                // Sheet1 every time.
                let sheetId;
                try {
                    const fWb = sheetState.univerAPI
                        && sheetState.univerAPI.getActiveWorkbook();
                    const fSh = fWb && fWb.getActiveSheet
                        && fWb.getActiveSheet();
                    if (fSh && typeof fSh.getSheetId === 'function') {
                        sheetId = fSh.getSheetId();
                    }
                } catch (e) { /* fall through to fallback */ }
                if (!sheetId || !snapshot.sheets[sheetId]) {
                    sheetId = (snapshot.sheetOrder && snapshot.sheetOrder[0])
                        || Object.keys(snapshot.sheets)[0];
                }
                const sheet = snapshot.sheets[sheetId];
                const cellData = (sheet && sheet.cellData) || {};
                const workbookStyles = snapshot.styles || {};

                const ps = psOverride || loadPageSetup();

                // Bounding range — only emit cells inside the populated
                // region so we don't print 200 empty rows after the data.
                let minR = 0, minC = 0, maxR = -1, maxC = -1;
                for (const r in cellData) {
                    if (!Object.prototype.hasOwnProperty.call(cellData, r)) continue;
                    const ri = +r;
                    for (const c in cellData[r]) {
                        if (!Object.prototype.hasOwnProperty.call(cellData[r], c)) continue;
                        const ci = +c;
                        const cell = cellData[ri][ci];
                        // Count a cell as "in range" if it has value OR style
                        // (so style-only borders on empty cells still print).
                        const hasV = cell && cell.v !== null && cell.v !== undefined && cell.v !== '';
                        const hasS = cell && cell.s;
                        if (!hasV && !hasS) continue;
                        if (ri > maxR) maxR = ri;
                        if (ci > maxC) maxC = ci;
                    }
                }
                if (maxR < 0 || maxC < 0) {
                    if (returnBlobOnly) return null;
                    alert('Sheet ว่างเปล่า');
                    return;
                }
                // Print Area override — if the user typed a range like
                // "A1:G100", clamp the bounds to it (still capped by the
                // populated region so we don't try to print cells past
                // the last data row).
                const pa = _parsePrintArea(ps.printArea);
                if (pa) {
                    minR = Math.max(0, pa.minR);
                    minC = Math.max(0, pa.minC);
                    maxR = Math.min(maxR, pa.maxR);
                    maxC = Math.min(maxC, pa.maxC);
                    if (maxR < minR || maxC < minC) {
                        if (returnBlobOnly) return null;
                        alert('พื้นที่พิมพ์ (Print Area) อยู่นอกข้อมูลที่มี');
                        return;
                    }
                }

                // Build a (row,col) → merge info map so the row builder
                // below can drop covered cells and emit anchor cells with
                // the right colSpan / rowSpan. Without this, merged title
                // rows like "บริษัท …" collapse into the first cell and
                // wrap inside one narrow column while the rest of the row
                // stays empty.
                const mergeMap = {};
                for (const m of (sheet.mergeData || [])) {
                    for (let r = m.startRow; r <= m.endRow; r++) {
                        if (!mergeMap[r]) mergeMap[r] = {};
                        for (let c = m.startColumn; c <= m.endColumn; c++) {
                            mergeMap[r][c] = {
                                isAnchor: r === m.startRow && c === m.startColumn,
                                rowSpan: m.endRow - m.startRow + 1,
                                colSpan: m.endColumn - m.startColumn + 1,
                            };
                        }
                    }
                }
                // Per-chunk row builder: walks the columns in `chunkCols`
                // (a subset of [0..maxC]), skips merge-covered cells, and
                // emits anchor cells with adjusted colSpan that doesn't
                // overshoot the chunk boundary. Excel behaves the same
                // way: a merge that spans col A-N split across two pages
                // shows A-G on page 1 with colSpan=7 and H-N on page 2
                // with colSpan=7 (Excel actually drops the merge and just
                // duplicates the value, we keep the visual merge inside
                // each chunk for readability).
                const buildRowForChunk = (r, chunkCols) => {
                    const chunkSet = new Set(chunkCols);
                    const out = [];
                    for (let i = 0; i < chunkCols.length; i++) {
                        const c = chunkCols[i];
                        const merge = mergeMap[r] && mergeMap[r][c];
                        if (merge && !merge.isAnchor) continue;
                        const cell = (cellData[r] && cellData[r][c]) || null;
                        const v = cell && cell.v;
                        const text = (v === null || v === undefined) ? '' : String(v);
                        if (merge && merge.isAnchor
                            && (merge.colSpan > 1 || merge.rowSpan > 1)) {
                            // Clip colSpan to the cells that still live
                            // in this chunk so we don't claim columns
                            // that ended up on the next page.
                            let span = 0;
                            for (let k = 0; k < merge.colSpan; k++) {
                                if (chunkSet.has(c + k)) span++;
                                else break;
                            }
                            const obj = { content: text };
                            if (span > 1) obj.colSpan = span;
                            if (merge.rowSpan > 1) obj.rowSpan = merge.rowSpan;
                            out.push(obj);
                        } else {
                            out.push(text);
                        }
                    }
                    return out;
                };

                // Headers/footers steal vertical space — reserve them in
                // the margin so autoTable doesn't draw rows under them.
                const headerSpace = ps.header ? 12 : 0;
                const footerSpace = ps.footer ? 6 : 0;

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({
                    unit: 'mm',
                    format: ps.paperSize,
                    orientation: ps.orientation,
                });
                doc.setFont('THSarabun', 'normal');

                // Resolve a Univer cell style (inline object OR registry
                // string id) to its full inline form. autoTable receives
                // sparse cells via section + indices — keep the lookup
                // local so didParseCell stays cheap.
                const resolveUniverStyle = (cell) => {
                    if (!cell || !cell.s) return null;
                    if (typeof cell.s === 'string') return workbookStyles[cell.s] || null;
                    return cell.s;
                };

                // Header/footer text built once + drawn on every page in
                // didDrawPage (autoTable re-fires it for each page break).
                const headerTitle = sheet.name || 'Sheet1';
                const headerSub = `พิมพ์เมื่อ ${new Date().toLocaleString('th-TH')}`;

                // Print-area-clamped column index range. _getUniverColumn
                // WidthsMm always returns widths starting at col 0 — slice
                // off the un-printed prefix when minC > 0.
                const allColWidthsMm = _getUniverColumnWidthsMm(sheet, maxC);
                const colWidthsMm = allColWidthsMm.slice(minC);
                const paperW = _paperWidthMm(ps.paperSize, ps.orientation);
                const printableW = Math.max(
                    10, paperW - ps.marginLeft - ps.marginRight);

                // #1 Scaling — Excel "Page Setup → Page" tab equivalent.
                // 'full'   = 100%, chunk wide tables horizontally.
                // 'fit'    = compute a uniform scale so the table fits in
                //            ps.fitWide pages wide (and optionally
                //            ps.fitTall pages tall — vertical fit is best-
                //            effort: we'd need to know per-row height to
                //            be exact, fall back to font scaling proportion
                //            of fitTall when set).
                // 'percent'= user-typed scalePercent (10..400).
                let scale = 1;
                if (ps.scaling === 'percent') {
                    scale = Math.max(0.1, Math.min(4, (ps.scalePercent || 100) / 100));
                } else if (ps.scaling === 'fit') {
                    const totalW = colWidthsMm.reduce((s, w) => s + w, 0);
                    const wideScale = printableW * (ps.fitWide || 1) / Math.max(1, totalW);
                    scale = Math.min(1, wideScale);
                }
                const scaledColWidths = colWidthsMm.map(w => w * scale);
                const fontSize = Math.max(4, 9 * scale);
                const cellPadding = Math.max(0.4, 1.6 * scale);

                // #2 Print Titles — the row/col range that should appear
                // on every printed page. Stored 1-based; convert to 0-
                // based here. Also intersect with the print-area-clamped
                // window so a repeat that lives outside the print area
                // is dropped silently.
                const repeatRowFirst = ps.repeatRowStart > 0
                    ? Math.max(minR, ps.repeatRowStart - 1) : -1;
                const repeatRowLast = ps.repeatRowEnd > 0
                    ? Math.min(maxR, ps.repeatRowEnd - 1) : -1;
                const hasRepeatRows = repeatRowFirst >= 0 && repeatRowLast >= repeatRowFirst;
                const repeatColFirst = ps.repeatColStart > 0
                    ? Math.max(minC, ps.repeatColStart - 1) : -1;
                const repeatColLast = ps.repeatColEnd > 0
                    ? Math.min(maxC, ps.repeatColEnd - 1) : -1;
                const hasRepeatCols = repeatColFirst >= 0 && repeatColLast >= repeatColFirst;
                const repeatCols = hasRepeatCols
                    ? Array.from({ length: repeatColLast - repeatColFirst + 1 },
                        (_, i) => repeatColFirst + i)
                    : [];
                const repeatColsWidthMm = repeatCols
                    .reduce((s, c) => s + (scaledColWidths[c - minC] || 0), 0);

                // The set of body columns (non-repeating). Repeat cols
                // prepend to every chunk so they appear on every page.
                const bodyCols = [];
                for (let c = minC; c <= maxC; c++) {
                    if (hasRepeatCols && c >= repeatColFirst && c <= repeatColLast) continue;
                    bodyCols.push(c);
                }
                const bodyColWidthsMm = bodyCols.map(
                    c => scaledColWidths[c - minC]);
                const splitterPrintableW = Math.max(
                    10, printableW - repeatColsWidthMm);
