                    // format ordered first.
                    const types = isDocsMode
                        ? [FS_TYPES_SAVE_JSON[0]]
                        : (isXlsxSource
                            ? [FS_TYPES_SAVE_XLSX[0], FS_TYPES_SAVE_JSON[0]]
                            : [FS_TYPES_SAVE_JSON[0], FS_TYPES_SAVE_XLSX[0]]);
                    let handle;
                    try {
                        handle = await window.showSaveFilePicker({
                            suggestedName: suggested,
                            types,
                        });
                    } catch (e) {
                        if (e && e.name === 'AbortError') return;
                        throw e;
                    }
                    const f = await handle.getFile();
                    // Docs mode never writes xlsx; force kind to json.
                    const isXlsx = !isDocsMode && /\.xlsx$/i.test(f.name);
                    const kind = isXlsx ? 'xlsx' : 'json';
                    setSheetOverlay(true, `กำลังเขียน ${f.name}...`);
                    const blob = isXlsx
                        ? await buildSheetXlsxBlob()
                        : buildSheetJsonBlob();
                    if (!blob) {
                        alert('Sheet ว่างเปล่า');
                        return;
                    }
                    await SeShared.fileIo.pickers.writeBlobToHandle(handle, blob);
                    setSheetFile(handle, f.name, kind);
                    setSheetDirty(false);
                    setSheetStatus(
                        `บันทึก: ${f.name} `
                        + `(${(blob.size / 1024 / 1024).toFixed(2)} MB)`
                    );
                } else {
                    // Firefox / Safari path — no native picker, fall back to
                    // a confirm + classic download. Docs mode skips the
                    // format prompt entirely (only .univer.json is valid).
                    let kind;
                    if (isDocsMode) {
                        kind = 'json';
                    } else {
                        const choice = confirm(
                            'เลือกรูปแบบไฟล์:\n\n' +
                            'ตกลง = .se.json (เก็บสูตรครบ — แนะนำ)\n' +
                            'ยกเลิก = .xlsx (สูตรกลายเป็นค่า)'
                        );
                        kind = choice ? 'json' : 'xlsx';
                    }
                    setSheetOverlay(true, 'กำลังเขียนไฟล์...');
                    const blob = kind === 'xlsx'
                        ? await buildSheetXlsxBlob()
                        : buildSheetJsonBlob();
                    if (!blob) {
                        alert('Sheet ว่างเปล่า');
                        return;
                    }
                    const ts = tsForFilename();
                    const fallbackName = isDocsMode
                        ? `Untitled_Document_${ts}.univer.json`
                        : (kind === 'xlsx'
                            ? `SE_Report_workbook_${ts}.xlsx`
                            : `SE_Report_workbook_${ts}.se.json`);
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = fallbackName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(url), 1000);
                    setSheetDirty(false);
                    setSheetStatus(
                        `บันทึก (download): ${fallbackName} `
                        + `(${(blob.size / 1024 / 1024).toFixed(2)} MB)`
                    );
                }
            } catch (e) {
                console.error(e);
                alert('บันทึกไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                setSheetOverlay(false);
                sheetState.saving = false;
            }
        }

        // Parse Excel Tables out of a .xlsx by unzipping its XML parts.
        // SheetJS Community Edition doesn't surface table metadata on its
        // parsed workbook, so we go to the raw zip:
        //   xl/worksheets/_rels/sheet{N}.xml.rels → maps sheet index → table xml file
        //   xl/tables/table{N}.xml               → table definition (range, name, columns)
        // Returns [{sheetIdx, name, range:{s,e}, columns:[{displayName}]}, ...]
        async function extractExcelTablesFromXlsx(arrayBuffer, sheetCount) {
            await loadJSZipAssets();
            const zip = await JSZip.loadAsync(arrayBuffer);
            const parser = new DOMParser();
            const results = [];
            // Sheet files are 1-indexed (sheet1.xml, sheet2.xml, ...) and
            // line up with wb.SheetNames order in the typical case (Excel
            // writes them in order). Robust mapping would parse workbook.xml
            // + workbook.xml.rels but for the user's primary use case (one
            // sheet with tables) this is sufficient.
            for (let i = 0; i < sheetCount; i++) {
                const relPath = `xl/worksheets/_rels/sheet${i + 1}.xml.rels`;
                const relFile = zip.files[relPath];
                if (!relFile) continue;
                const relXml = await relFile.async('text');
                const relDoc = parser.parseFromString(relXml, 'text/xml');
                const rels = Array.from(relDoc.getElementsByTagName('Relationship'));
                for (const rel of rels) {
                    const target = rel.getAttribute('Target') || '';
                    if (!/tables\/table\d+\.xml$/i.test(target)) continue;
                    // Target is typically "../tables/table1.xml"; resolve to
                    // an absolute path inside the zip.
                    const tablePath = target.startsWith('../')
                        ? 'xl/' + target.slice(3)
                        : (target.startsWith('xl/') ? target : 'xl/' + target);
                    const tableFile = zip.files[tablePath];
                    if (!tableFile) continue;
                    const tableXml = await tableFile.async('text');
                    const tableDoc = parser.parseFromString(tableXml, 'text/xml');
                    const tEl = tableDoc.documentElement;
                    if (!tEl) continue;
                    const name = tEl.getAttribute('displayName')
                        || tEl.getAttribute('name')
                        || 'Table';
                    const ref = tEl.getAttribute('ref');
                    if (!ref) continue;
                    const range = XLSX.utils.decode_range(ref);
                    const colEls = Array.from(tableDoc.getElementsByTagName('tableColumn'));
                    const columns = colEls.map(el => ({
                        displayName: el.getAttribute('name') || 'Column',
                    }));
                    results.push({ sheetIdx: i, name, range, columns });
                }
            }
            return results;
        }

        // Random short id for Univer's table / column ids — same shape
        // (~10 chars) as the runtime addTable produces.
        function _shortId(prefix) {
            return (prefix || '') + Math.random().toString(36).slice(2, 11);
        }

        // Excel border style names (xl/styles.xml) → Univer BorderStyleTypes
        // numeric values. Univer's actual enum (verified at runtime against
        // window.UniverCore.BorderStyleTypes in 0.22.1):
        //   1=THIN, 2=HAIR, 3=DOTTED, 4=DASHED,
        //   5=DASH_DOT, 6=DASH_DOT_DOT, 7=DOUBLE,
        //   8=MEDIUM, 9=MEDIUM_DASHED,
        //   10=MEDIUM_DASH_DOT, 11=MEDIUM_DASH_DOT_DOT,
        //   12=SLANT_DASH_DOT, 13=THICK
        // Notable: this differs from the @univerjs/core doc tables — verify
        // by inspecting window.UniverCore.BorderStyleTypes after a Univer
        // version bump if borders ever look "off" again. Excel "medium" and
        // "thick" being mis-mapped is the symptom that exposes a drift.
        // Unknown styles fall back to THIN.
        const _EXCEL_BORDER_STYLE_TO_UNIVER = {
            thin: 1, hair: 2, dotted: 3, dashed: 4,
            dashDot: 5, dashDotDot: 6, double: 7,
            medium: 8, mediumDashed: 9,
            mediumDashDot: 10, mediumDashDotDot: 11,
            slantDashDot: 12, thick: 13,
        };

        // Inverse of the above — used when writing .xlsx back out so the
        // borders we imported survive the round-trip. Mirrors the same
        // index ↔ name pairs.
        const _UNIVER_BORDER_STYLE_TO_XLSX = {
            1: 'thin', 2: 'hair', 3: 'dotted', 4: 'dashed',
            5: 'dashDot', 6: 'dashDotDot', 7: 'double',
            8: 'medium', 9: 'mediumDashed',
            10: 'mediumDashDot', 11: 'mediumDashDotDot',
            12: 'slantDashDot', 13: 'thick',
        };

        // Strip the optional leading "#" from a Univer hex colour and
        // upper-case it so xlsx-js-style accepts it (it wants bare 6-char
        // hex with no prefix). Returns null when the input isn't usable.
        function _univerColorToXlsxRgb(c) {
            if (!c || !c.rgb) return null;
            const s = String(c.rgb).replace(/^#/, '').toUpperCase();
            return /^[0-9A-F]{6}$/.test(s) ? s : null;
        }

        // Translate a Univer cell-level style (inline object OR a string
        // id pointing into workbook.styles) into a xlsx-js-style cell
        // style. Maps:
        //   - bd.{t,b,l,r}  → border.{top,bottom,left,right}
        //   - bg            → fill (solid)
        //   - ff/fs/cl/bl/it/ul/st → font.{name,sz,color,bold,italic,
        //                                  underline,strike}
        //   - ht/vt/tb      → alignment.{horizontal,vertical,wrapText}
        // Returns null when nothing maps (caller can skip).
        function _univerStyleToXlsx(cellS, workbookStyles) {
            if (!cellS) return null;
            const us = (typeof cellS === 'string')
                ? (workbookStyles && workbookStyles[cellS])
                : cellS;
            if (!us || typeof us !== 'object') return null;
            const out = {};
            if (us.bd) {
                const border = {};
                const edge = (e) => {
                    if (!e) return null;
                    return {
                        style: _UNIVER_BORDER_STYLE_TO_XLSX[e.s] || 'thin',
                        color: { rgb: _univerColorToXlsxRgb(e.cl) || '000000' },
                    };
                };
                const t = edge(us.bd.t); if (t) border.top = t;
                const b = edge(us.bd.b); if (b) border.bottom = b;
                const l = edge(us.bd.l); if (l) border.left = l;
                const r = edge(us.bd.r); if (r) border.right = r;
                if (Object.keys(border).length) out.border = border;
            }
            const bgRgb = _univerColorToXlsxRgb(us.bg);
            if (bgRgb) {
                out.fill = {
                    patternType: 'solid',
                    fgColor: { rgb: bgRgb },
                    bgColor: { rgb: bgRgb },
                };
            }
            const font = {};
            if (us.ff) font.name = us.ff;
            if (us.fs) font.sz = us.fs;
            const fontRgb = _univerColorToXlsxRgb(us.cl);
            if (fontRgb) font.color = { rgb: fontRgb };
            if (us.bl) font.bold = true;
            if (us.it) font.italic = true;
            if (us.ul) font.underline = true;
            if (us.st) font.strike = true;
            if (Object.keys(font).length) out.font = font;
            if (us.ht || us.vt || us.tb === 3) {
                const alignment = {};
                const H = { 1: 'left', 2: 'center', 3: 'right', 4: 'justify' };
                const V = { 1: 'top', 2: 'center', 3: 'bottom', 4: 'justify' };
                if (us.ht && H[us.ht]) alignment.horizontal = H[us.ht];
                if (us.vt && V[us.vt]) alignment.vertical = V[us.vt];
                if (us.tb === 3) alignment.wrapText = true;
                if (Object.keys(alignment).length) out.alignment = alignment;
            }
            return Object.keys(out).length ? out : null;
        }

        // Excel uses 8-char ARGB ("FF000000") — Univer wants 6-char hex
        // ("#000000"). Drops the alpha channel.
        function _argbToHex(argb) {
            if (!argb) return '#000000';
            let s = String(argb).replace(/^#/, '');
            if (s.length === 8) s = s.slice(2);
            if (s.length !== 6) return '#000000';
            return '#' + s.toUpperCase();
        }

        // Parse one border edge element (<left>/<right>/<top>/<bottom>).
        // Returns null if the edge is missing or style="none". Theme/indexed
        // colours collapse to default black — full theme/indexed parsing is
        // out of scope (would need theme1.xml + the indexed-color table).
        function _parseBorderEdge(el) {
            if (!el) return null;
            const style = el.getAttribute('style');
            if (!style || style === 'none') return null;
            const colorEl = el.getElementsByTagName('color')[0];
            let rgb = null;
            if (colorEl) {
                rgb = colorEl.getAttribute('rgb');
                if (!rgb) rgb = 'FF000000';
            }
            return { style, rgb: rgb || 'FF000000' };
        }

        // Extract cell-level styles (borders, fills, fonts) from a .xlsx zip.
        // SheetJS Community Edition strips the `s` attribute off cells during
        // parse, so we re-parse xl/worksheets/sheet{N}.xml ourselves to get
        // each cell's style index, then resolve it against xl/styles.xml.
        // Returns an array indexed by sheet position; each entry is a
        // { "A1": <univer style obj>, ... } map.
        async function extractExcelCellStylesFromXlsx(arrayBuffer, sheetCount) {
            await loadJSZipAssets();
            const zip = await JSZip.loadAsync(arrayBuffer);
            const parser = new DOMParser();
            const stylesFile = zip.files['xl/styles.xml'];
            if (!stylesFile) return [];
            const stylesDoc = parser.parseFromString(
                await stylesFile.async('text'), 'text/xml');

            // borders[i] = { l, r, t, b } edges (each: { style, rgb } | null)
            const bordersEl = stylesDoc.getElementsByTagName('borders')[0];
            const borderDefs = [];
            if (bordersEl) {
                for (const bEl of Array.from(bordersEl.children)) {
                    borderDefs.push({
                        l: _parseBorderEdge(bEl.getElementsByTagName('left')[0]),
                        r: _parseBorderEdge(bEl.getElementsByTagName('right')[0]),
                        t: _parseBorderEdge(bEl.getElementsByTagName('top')[0]),
                        b: _parseBorderEdge(bEl.getElementsByTagName('bottom')[0]),
                    });
                }
            }

            // fills[i] = { rgb } | null. Skip "none" and the gray125 placeholder
            // (Excel always writes gray125 as fill index 1 — never a real fill).
            const fillsEl = stylesDoc.getElementsByTagName('fills')[0];
            const fillDefs = [];
            if (fillsEl) {
                for (const fEl of Array.from(fillsEl.children)) {
                    const pat = fEl.getElementsByTagName('patternFill')[0];
                    if (!pat) { fillDefs.push(null); continue; }
                    const ptype = pat.getAttribute('patternType');
                    if (!ptype || ptype === 'none' || ptype === 'gray125') {
                        fillDefs.push(null); continue;
                    }
                    const fg = pat.getElementsByTagName('fgColor')[0];
                    const rgb = fg ? fg.getAttribute('rgb') : null;
                    fillDefs.push(rgb ? { rgb } : null);
                }
            }

            // fonts[i] = { bold, italic, ul, strike, rgb, size, family }
            const fontsEl = stylesDoc.getElementsByTagName('fonts')[0];
            const fontDefs = [];
            if (fontsEl) {
                for (const fEl of Array.from(fontsEl.children)) {
                    const colorEl = fEl.getElementsByTagName('color')[0];
                    const szEl = fEl.getElementsByTagName('sz')[0];
                    const nameEl = fEl.getElementsByTagName('name')[0];
                    fontDefs.push({
                        bold: fEl.getElementsByTagName('b').length > 0,
                        italic: fEl.getElementsByTagName('i').length > 0,
                        ul: fEl.getElementsByTagName('u').length > 0,
                        strike: fEl.getElementsByTagName('strike').length > 0,
                        rgb: colorEl ? colorEl.getAttribute('rgb') : null,
                        size: szEl ? parseFloat(szEl.getAttribute('val')) : null,
                        family: nameEl ? nameEl.getAttribute('val') : null,
                    });
                }
            }

            // cellXfs[i] = { borderId, fillId, fontId, alignment } — the
            // style records that cells reference via their `s` attribute.
            // Alignment lives in a child <alignment horizontal=... vertical=...
            // wrapText=...> element on the xf when applyAlignment is set.
            const cellXfsEl = stylesDoc.getElementsByTagName('cellXfs')[0];
            const cellXfs = [];
            if (cellXfsEl) {
                for (const xfEl of Array.from(cellXfsEl.children)) {
                    const alignEl = xfEl.getElementsByTagName('alignment')[0];
                    let align = null;
                    if (alignEl) {
                        align = {
                            horizontal: alignEl.getAttribute('horizontal'),
                            vertical: alignEl.getAttribute('vertical'),
                            wrapText: alignEl.getAttribute('wrapText') === '1',
                        };
                    }
                    cellXfs.push({
                        borderId: parseInt(xfEl.getAttribute('borderId') || '0'),
                        fillId: parseInt(xfEl.getAttribute('fillId') || '0'),
                        fontId: parseInt(xfEl.getAttribute('fontId') || '0'),
                        align,
                    });
                }
            }

            // Excel horizontal/vertical alignment → Univer's HorizontalAlign /
            // VerticalAlign enums: 1=LEFT/TOP, 2=CENTER/MIDDLE, 3=RIGHT/BOTTOM.
            const HALIGN_MAP = {
                left: 1, center: 2, centerContinuous: 2, right: 3,
                justify: 4, distributed: 4, fill: 0, general: 0,
            };
            const VALIGN_MAP = {
                top: 1, center: 2, middle: 2, bottom: 3,
                justify: 4, distributed: 4,
            };

            // Convert one xf record + the style tables → Univer cell style obj
            const xfToStyle = (xf) => {
                const us = {};
                const bd = borderDefs[xf.borderId];
                if (bd) {
                    const edges = {};
                    const makeEdge = (edge) => ({
                        s: _EXCEL_BORDER_STYLE_TO_UNIVER[edge.style] || 1,
                        cl: { rgb: _argbToHex(edge.rgb) },
                    });
                    if (bd.t) edges.t = makeEdge(bd.t);
                    if (bd.b) edges.b = makeEdge(bd.b);
                    if (bd.l) edges.l = makeEdge(bd.l);
                    if (bd.r) edges.r = makeEdge(bd.r);
                    if (Object.keys(edges).length) us.bd = edges;
                }
                const fill = fillDefs[xf.fillId];
                if (fill && fill.rgb) us.bg = { rgb: _argbToHex(fill.rgb) };
                const font = fontDefs[xf.fontId];
                if (font) {
                    if (font.bold) us.bl = 1;
                    if (font.italic) us.it = 1;
                    if (font.ul) us.ul = { s: 1 };
                    if (font.strike) us.st = { s: 1 };
                    if (font.rgb) us.cl = { rgb: _argbToHex(font.rgb) };
                    if (font.size && font.size !== 11) us.fs = font.size;
                    if (font.family && font.family !== 'Calibri') us.ff = font.family;
                }
                if (xf.align) {
                    const h = HALIGN_MAP[xf.align.horizontal];
                    const v = VALIGN_MAP[xf.align.vertical];
                    if (h) us.ht = h;
                    if (v) us.vt = v;
                    // Univer TextWrap: 0=OVERFLOW (default), 3=WRAP. Only set
                    // when explicit so cells without wrapText stay overflow.
                    if (xf.align.wrapText) us.tb = 3;
                }
                return Object.keys(us).length ? us : null;
            };

            // Walk each sheet's XML and pull out (cellAddr → styleObj)
            const stylesPerSheet = [];
            for (let i = 0; i < sheetCount; i++) {
                const sheetFile = zip.files[`xl/worksheets/sheet${i + 1}.xml`];
                if (!sheetFile) { stylesPerSheet.push({}); continue; }
                const sheetDoc = parser.parseFromString(
                    await sheetFile.async('text'), 'text/xml');
                const cellEls = Array.from(sheetDoc.getElementsByTagName('c'));
                const styles = {};
                for (const cEl of cellEls) {
                    const addr = cEl.getAttribute('r');
                    const sIdx = cEl.getAttribute('s');
                    if (!addr || sIdx === null) continue;
                    const xf = cellXfs[parseInt(sIdx)];
                    if (!xf) continue;
                    const us = xfToStyle(xf);
                    if (us) styles[addr] = us;
                }
                stylesPerSheet.push(styles);
            }
            return stylesPerSheet;
        }

        // Thai Excel BE (Buddhist Era) date handling lives in
        // SeShared.xlsx.thaiBe — see xlsxWorkbookToUniver below for the
        // applyToWorkbook integration point and XLSX_THAI_BE_IMPORT.md
        // for the full rationale.

        // Convert a SheetJS workbook (XLSX.read result) into the same
        // IWorkbookData shape Univer expects. Preserves cell values + types
        // + formulas + merged cells; SheetJS community edition strips cell
        // styles so colour/font/borders won't carry over (acceptable trade
        // for a free reader — users can re-style after import).
        //
        // Also extracts Excel Tables (xl/tables/*.xml) from the raw zip
        // when `arrayBuffer` is passed, and injects them as a
        // SHEET_TABLE_PLUGIN resource so Univer's table preset renders them
        // on mount. Style/colour of Excel tables collapses to the default
        // table-default-0 style (one-size-fits-all is fine; users get
        // layout + filters back, which is the visible bit they're after).
        async function xlsxWorkbookToUniver(wb, fileName, arrayBuffer) {
            const sheetOrder = [];
            const sheets = {};
            const ts = Date.now();

            wb.SheetNames.forEach((name, idx) => {
                const ws = wb.Sheets[name];
                if (!ws || !ws['!ref']) return;
                const range = XLSX.utils.decode_range(ws['!ref']);
                const cellData = {};
                let maxR = -1, maxC = -1;

                for (let r = range.s.r; r <= range.e.r; r++) {
                    for (let c = range.s.c; c <= range.e.c; c++) {
                        const addr = XLSX.utils.encode_cell({ r, c });
                        const cell = ws[addr];
                        if (!cell) continue;
                        const v = cell.v;
                        // SheetJS sheetStubs=true marks formula-only cells
                        // as t='z' with filler v=0; treat those as
                        // "no cached value" so Univer recomputes on mount.
                        const isStub = cell.t === 'z';
                        const hasValue = !isStub
                            && !(v === null || v === undefined || v === '');
                        // Skip only when nothing of interest survives —
                        // empty cell with no formula and no number format
                        // contributes nothing to the import.
                        if (!hasValue && !cell.f && !cell.z) continue;
                        if (!cellData[r]) cellData[r] = {};
                        let cellObj;
                        if (hasValue) {
                            const isNum = typeof v === 'number' && Number.isFinite(v);
                            cellObj = {
                                v: isNum ? v : String(v),
                                t: isNum ? UNIVER_T_NUMBER : UNIVER_T_STRING,
                            };
                        } else {
                            // CRITICAL: omit `v` and `t` entirely for
                            // formula-only cells. Setting v=0 or v=''
                            // makes Univer's formula engine treat it as
                            // a cached result and skip recompute, leaving
                            // the cell blank on mount.
                            cellObj = {};
                        }
                        // Preserve formulas. SheetJS strips the leading '=';
                        // Univer's formula engine wants it included.
                        if (cell.f) {
                            cellObj.f = cell.f.startsWith('=') ? cell.f : '=' + cell.f;
                        }
                        // Preserve numFmt pattern from cellNF=true read.
                        // Univer's numfmt plugin consumes Excel format
                        // codes directly through s.n.pattern.
                        if (cell.z && cell.z !== 'General') {
                            cellObj.s = Object.assign({}, cellObj.s, {
                                n: { pattern: cell.z },
                            });
                        }
                        cellData[r][c] = cellObj;
                        if (r > maxR) maxR = r;
                        if (c > maxC) maxC = c;
                    }
                }

                if (maxR < 0) return;  // sheet had !ref but no actual values

                const sheetId = `sheet-${idx}-${ts}`;
                sheetOrder.push(sheetId);
                sheets[sheetId] = {
                    id: sheetId,
                    name,
                    rowCount: Math.max(maxR + 50, 200),
                    columnCount: Math.max(maxC + 5, 26),
                    cellData,
                    // Translate SheetJS merge ranges {s:{r,c},e:{r,c}} →
                    // Univer's {startRow, endRow, startColumn, endColumn}.
                    mergeData: (ws['!merges'] || []).map(m => ({
                        startRow: m.s.r,
                        endRow: m.e.r,
                        startColumn: m.s.c,
                        endColumn: m.e.c,
                    })),
                    defaultColumnWidth: 110,
                    defaultRowHeight: 24,
                };
            });

            if (sheetOrder.length === 0) {
                throw new Error('ไม่พบชีตที่มีข้อมูลในไฟล์');
            }

            // Extract cell-level styles (borders, fills, fonts) and merge them
            // into the sparse cellData. SheetJS CE strips cell `.s` indices on
            // parse so empty-but-styled cells (e.g. a bordered template region)
            // are entirely absent — we walk xl/worksheets/sheet*.xml ourselves
            // and seed those cells here so the borders render.
            if (arrayBuffer) {
                try {
                    const stylesPerSheet = await extractExcelCellStylesFromXlsx(
                        arrayBuffer, wb.SheetNames.length);
                    sheetOrder.forEach((sid, sheetIdx) => {
                        const cellStyles = stylesPerSheet[sheetIdx];
                        if (!cellStyles) return;
                        const cellData = sheets[sid].cellData;
                        let maxR = -1, maxC = -1;
                        for (const addr of Object.keys(cellStyles)) {
                            const { r, c } = XLSX.utils.decode_cell(addr);
                            if (!cellData[r]) cellData[r] = {};
                            if (!cellData[r][c]) {
                                cellData[r][c] = { v: '', t: UNIVER_T_STRING };
                            }
                            cellData[r][c].s = Object.assign(
                                {}, cellData[r][c].s || {}, cellStyles[addr]);
                            if (r > maxR) maxR = r;
                            if (c > maxC) maxC = c;
                        }
                        // Grow rowCount/columnCount so the styled cells are
                        // inside the visible sheet bounds (otherwise borders
                        // past the prior maxR/maxC would be clipped).
                        const sheet = sheets[sid];
                        sheet.rowCount = Math.max(sheet.rowCount, maxR + 50);
                        sheet.columnCount = Math.max(sheet.columnCount, maxC + 5);
                    });
                } catch (e) {
                    console.warn('extractExcelCellStylesFromXlsx failed:', e);
                }
            }

            // Extract Excel Tables from the raw zip and convert to a
            // SHEET_TABLE_PLUGIN resource so Univer's table preset picks
            // them up on createWorkbook. Best-effort: any parse failure is
            // logged and the import continues without tables (preferable to
            // failing the whole open).
            const resources = [];
            if (arrayBuffer) {
                try {
                    const excelTables = await extractExcelTablesFromXlsx(arrayBuffer, wb.SheetNames.length);
                    if (excelTables.length > 0) {
                        const bySheet = {};
                        for (const t of excelTables) {
                            const sid = sheetOrder[t.sheetIdx];
                            if (!sid) continue;
                            if (!bySheet[sid]) bySheet[sid] = [];
                            bySheet[sid].push({
                                id: _shortId('t-'),
                                name: t.name,
                                range: {
                                    startRow: t.range.s.r,
                                    startColumn: t.range.s.c,
                                    endRow: t.range.e.r,
                                    endColumn: t.range.e.c,
                                },
                                options: {
                                    showHeader: true,
                                    showFooter: false,
                                    tableStyleId: 'table-default-0',
                                },
                                filters: { tableColumnFilterList: [] },
                                columns: t.columns.map(c => ({
                                    id: _shortId('c-'),
                                    displayName: c.displayName,
                                    dataType: 'string',
                                    formula: '',
                                    meta: {},
                                    style: {},
                                })),
                            });
                        }
                        const pluginData = {};
                        for (const sid of Object.keys(bySheet)) {
                            pluginData[sid] = {
                                tables: bySheet[sid],
                                tableFilteredOutRows: [],
                            };
                        }
                        resources.push({
                            name: 'SHEET_TABLE_PLUGIN',
                            data: JSON.stringify(pluginData),
                        });
                    }
                } catch (e) {
                    console.warn('extractExcelTablesFromXlsx failed:', e);
                }
            }

            // Layer 4 — Thai Buddhist Era date conversion.
            // Delegated to SeShared.xlsx.thaiBe.applyToWorkbook, which
            // walks every sheet's cellData, rewrites text + numeric BE
            // dates to CE serials, and translates yyyy→bbbb across all
            // date format patterns so formula results render in BE too.
            // Mutates in place; pass the partial workbook shape it needs.
            await loadXlsxThaiBeAssets();
            SeShared.xlsx.thaiBe.applyToWorkbook({ sheets });

            return {
                id: 'wb-' + ts,
                name: fileName || 'Imported Workbook',
                appVersion: '0.10.0',
                locale: 'enUS',
                sheetOrder,
                sheets,
                styles: {},
                resources,
            };
        }

        // Long MIME types are needed because Chrome on some setups hides
        // files when the extension list alone doesn't match the OS-reported
        // MIME (the symptom that prompted this list).
        // New brand: .se / .se.json. Keep .univer.json so files saved
        // before the rename still open. Plain .json stays too — useful
        // for ad-hoc edits in an editor and for the few users who type
        // their own filename.
        const FILE_ACCEPT_LIST = [
            '.se', '.se.json',
            '.univer.json', '.json',
            '.xlsx', '.xls',
            'application/json',
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            'application/vnd.ms-excel',
        ];

        // FS Access API type filters for showOpenFilePicker / showSave-
        // FilePicker. The XLSX one uses the long MIME the standard expects.
        // Open picker bundles SE + Excel extensions into a single entry so
        // the user sees every supported workbook at once without having to
        // switch the type dropdown.
        const FS_TYPES_OPEN = [
            {
                description: 'SE / Excel workbook',
                accept: {
                    'application/json': ['.se', '.se.json', '.univer.json', '.json'],
                    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx', '.xls'],
                },
            },
        ];
        // Docs-mode picker filter — only the Univer JSON snapshot format.
        const FS_TYPES_OPEN_DOCS = [
            {
                description: 'Univer document',
                accept: {
                    'application/json': ['.univer.json', '.json'],
                },
            },
        ];
        const FS_TYPES_SAVE_JSON = [
            { description: 'SE workbook',
              accept: { 'application/json': ['.se.json'] } },
        ];
        const FS_TYPES_SAVE_XLSX = [
            { description: 'Excel workbook',
              accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } },
        ];

        // Centralize file-handle bookkeeping: keep sheetState.fileHandle /
        // fileName / fileKind in sync and surface the active filename via
        // Open/Save tooltips + the small label after the Print button so
        // the user knows what gets overwritten on the next Save.
        function setSheetFile(handle, name, kind) {
            sheetState.fileHandle = handle || null;
            sheetState.fileName = name || null;
            sheetState.fileKind = kind || null;
            const openBtn = document.querySelector('.se-file-ops [data-op="open"]');
            if (openBtn) {
                openBtn.title = name
                    ? `เปิดไฟล์อื่น (ปัจจุบัน: ${name})`
                    : 'เปิดไฟล์ .se / .se.json หรือ Excel';
            }
            const saveBtn = document.querySelector('.se-file-ops [data-op="save"]');
            if (saveBtn) {
                saveBtn.title = name
                    ? `บันทึกทับ ${name}`
                    : 'บันทึก (ครั้งแรกจะถามที่บันทึก)';
            }
            const saveAsBtn = document.querySelector('.se-file-ops [data-op="saveas"]');
            if (saveAsBtn) {
                saveAsBtn.title = 'บันทึกเป็น... (เลือก path / format)';
            }
            const fnLabel = document.getElementById('sheetFileName');
            if (fnLabel) {
                if (name) {
                    fnLabel.textContent = name;
                    fnLabel.title = `ไฟล์ปัจจุบัน: ${name}`;
                    fnLabel.style.display = '';
                } else {
                    fnLabel.textContent = '';
                    fnLabel.removeAttribute('title');
                    fnLabel.style.display = 'none';
                }
            }
        }

        async function openSheetFile() {
            if (sheetState.dirty && !confirm('มีการแก้ไขที่ยังไม่ได้บันทึก — เปิดไฟล์ใหม่จะทับของเดิม\n\nต้องการต่อ?')) return;

            const isDocsMode = sheetState.mode === 'docs';

            // Shared picker auto-dispatches: FSA on Chrome/Edge (returns a
            // FileSystemFileHandle for later in-place Save), <input> on
            // Firefox/Safari/Brave-with-FSA-disabled (handle stays null,
            // so saves fall through to the download path).
            let r;
            try {
                await loadFileIoPickersAssets();
                r = await SeShared.fileIo.pickers.openFile({
                    types: isDocsMode ? FS_TYPES_OPEN_DOCS : FS_TYPES_OPEN,
                    accept: FILE_ACCEPT_LIST.join(','),
                });
            } catch (e) {
                console.error(e);
                alert('เปิดไฟล์ไม่สำเร็จ: ' + (e && e.message || e));
                return;
            }
            if (r.cancelled || !r.file) return;
            const file = r.file;
            const handle = r.handle || null;

            try {
                setSheetOverlay(true, `กำลังอ่านไฟล์ ${file.name}...`);
                await loadUniverAssets(sheetState.mode);

                // Excel import is sheets-only. In docs mode, .xlsx files are
                // rejected with an explicit message rather than silently
                // mismounting into the wrong shape.
                const isExcel = /\.(xlsx|xls)$/i.test(file.name);
                if (isDocsMode && isExcel) {
                    throw new Error('โหมดเอกสารรองรับเฉพาะไฟล์ .univer.json เท่านั้น');
                }

                let data;
                if (isExcel) {
                    setSheetOverlay(true, `กำลังโหลด SheetJS...`);
                    await loadSheetJsAssets();
                    setSheetOverlay(true, `กำลังอ่าน ${file.name}...`);
                    const buf = await file.arrayBuffer();
                    // sheetStubs: keep cells that have only <f>FORMULA</f>
                    // with empty <v> (Excel files saved with
                    // fullCalcOnLoad=1 don't cache values — SheetJS would
                    // otherwise drop them and Univer would see 0 formulas).
                    // cellNF: populate cell.z with the resolved format
                    // pattern (e.g. "dd/mm/yyyy") so we can preserve it
                    // through to Univer's numfmt plugin.
                    const wb = XLSX.read(buf, {
                        type: 'array',
                        sheetStubs: true,
                        cellNF: true,
                    });
                    data = await xlsxWorkbookToUniver(wb, file.name, buf);
                } else {
                    const text = await file.text();
                    data = JSON.parse(text);
                    if (!data || typeof data !== 'object') {
                        throw new Error('รูปแบบไฟล์ไม่ถูกต้อง');
                    }
                    if (isDocsMode) {
                        // Heuristic: a docs snapshot has body + (paragraphs
                        // or dataStream). Sheets snapshot has .sheets. Reject
                        // a sheets-shaped file in docs mode (and vice versa).
                        if (data.sheets || !data.body) {
                            throw new Error('ไฟล์นี้ไม่ใช่เอกสาร Univer (.univer.json) — เปิดในโหมด Sheets แทน');
                        }
                    } else {
                        if (!data.sheets) {
                            throw new Error('รูปแบบไฟล์ไม่ถูกต้อง — คาดว่าเป็น SE workbook (.se / .se.json / .univer.json) หรือ Excel (.xlsx / .xls)');
                        }
                    }
                }
                sheetState.mounted = false;
                mountUniver(data, `เปิดจากไฟล์: ${file.name}`);
                setSheetFile(handle, file.name, isExcel ? 'xlsx' : 'json');
            } catch (e) {
                console.error(e);
                alert('เปิดไฟล์ไม่สำเร็จ: ' + (e && e.message || e));
            } finally {
                setSheetOverlay(false);
            }
        }

        window.addEventListener('beforeunload', (e) => {
            if (sheetState.dirty) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // ========== STANDALONE INIT ==========
        // Launcher-first UX with History API routing:
        //   /          → launcher (Sheets + Docs cards)
        //   /sheets    → Sheets editor
        //   /docs      → Documents editor
        // The initial path is honored on page load — bookmarks and refresh
        // land back on the same view (requires nginx SPA fallback). Card
        // clicks + Home button pushState; popstate handles back/forward.
        const _initialMode = _routeToMode(_currentPath());
        if (_initialMode) {
            _lastAppliedPath = _currentPath();
            _doEnterMode(_initialMode);
        } else {
            // Normalize unknown paths to '/' so back/forward has a stable
            // home entry. replaceState is silent (no popstate fired).
            if (_currentPath() !== ROUTES.HOME) {
                history.replaceState(null, '', ROUTES.HOME);
            }
            _lastAppliedPath = ROUTES.HOME;
            showLauncher();
        }
        document.querySelectorAll('#launcher .launcher-card').forEach((card) => {
            card.addEventListener('click', () => {
                if (card.disabled) return;
                const mode = card.getAttribute('data-mode');
                if (mode === 'sheets' || mode === 'docs') navigateTo(mode);
            });
        });
        // Print assets are sheets-only and large — defer until the user
        // actually picks Sheets so the launcher feels light.
        if (typeof preloadPrintAssets === 'function') {
            // no-op on initial load; preloadPrintAssets still runs from
            // inside printActiveView / openPageSetupModal when needed.
        }
    </script>
</body>
</html>
